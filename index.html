<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ФСО Тестирование</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #111820;
            border-radius: 24px;
            padding: 20px 30px;
            border: 1px solid #26333d;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #1f2f3a inset;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            color: #9fc8d9;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title .badge {
            background: #1a2f3a;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 13px;
            color: #6fa3b5;
            border: 1px solid #2a4857;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #1a3340;
            border: 1px solid #2f5465;
            color: #c4e4f0;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: #234a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.15);
        }

        .nav-btn.active {
            background: #2a4a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 20px rgba(74, 138, 160, 0.2);
        }

        .admin-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a2a2a;
            border: 1px solid #2a5a5a;
            border-radius: 40px;
            padding: 6px 16px;
            color: #6fd6b8;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .admin-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3ccf9e;
            box-shadow: 0 0 12px rgba(60, 207, 158, 0.3);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .content {
            background: #111820;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #26333d;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #1f2f3a inset;
            min-height: 500px;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        .mb-20 { margin-bottom: 20px; }

        .btn-primary {
            background: #1a3340;
            border: 1px solid #2f5465;
            color: #c4e4f0;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: #234a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.15);
        }

        .btn-danger {
            background: #2a1a1a;
            border: 1px solid #6a2a2a;
            color: #f0b0b0;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-danger:hover {
            background: #3a2222;
            border-color: #8a3a3a;
        }

        .btn-danger-small {
            background: #2a1a1a;
            border: 1px solid #6a2a2a;
            color: #f0b0b0;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-danger-small:hover {
            background: #3a2222;
            border-color: #8a3a3a;
        }

        .btn-success {
            background: #1a2a2a;
            border: 1px solid #2a5a5a;
            color: #6fd6b8;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-success:hover {
            background: #1a3a3a;
            border-color: #3a7a7a;
        }

        .btn-success-small {
            background: #1a2a2a;
            border: 1px solid #2a5a5a;
            color: #6fd6b8;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-success-small:hover {
            background: #1a3a3a;
            border-color: #3a7a7a;
        }

        .btn-warning {
            background: #2a2a1a;
            border: 1px solid #6a6a2a;
            color: #f5c27a;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-warning:hover {
            background: #3a3a22;
            border-color: #8a8a3a;
        }

        .form-control {
            background: #0e161e;
            border: 1px solid #21343f;
            border-radius: 10px;
            padding: 10px 14px;
            color: #dcecf5;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: 0.25s;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-control:focus {
            border-color: #4a8aa0;
            box-shadow: 0 0 0 3px rgba(74, 138, 160, 0.15);
        }

        .form-control.error {
            border-color: #8a3a3a;
            box-shadow: 0 0 0 3px rgba(138, 58, 58, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3340;
            border: 1px solid #4a8aa0;
            color: #cce2ec;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #111820;
            border: 1px solid #26333d;
            border-radius: 24px;
            padding: 30px;
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }

        .modal-title {
            color: #9fc8d9;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1f313b;
            padding-bottom: 15px;
        }

        .modal-close {
            float: right;
            background: transparent;
            border: none;
            color: #5d8b9a;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: #e8827a;
        }

        .tests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .test-card {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
            position: relative;
        }

        .test-card:hover {
            border-color: #3a6072;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.05);
            transform: translateY(-2px);
        }

        .test-card .test-name {
            color: #dcecf5;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .test-card .test-meta {
            color: #7a9aa8;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .test-card .test-stats {
            color: #5d8b9a;
            font-size: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #1f323d;
        }

        .test-card .lock-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #f5c27a;
            font-size: 18px;
        }

        .test-taking {
            display: none;
        }

        .test-taking.active {
            display: block;
        }

        .test-list {
            display: block;
        }

        .test-list.hidden {
            display: none;
        }

        .option-label {
            display: block;
            color: #cce2ec;
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid #1f323d;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover {
            border-color: #3a6072;
            background: #14242e;
        }

        .option-label input[type="radio"], .option-label input[type="checkbox"] {
            margin-right: 10px;
            accent-color: #4a8aa0;
        }

        .text-answer {
            color: #cce2ec;
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid #1f323d;
            border-radius: 8px;
            background: #0e161e;
        }

        .text-answer textarea {
            background: transparent;
            border: none;
            color: #cce2ec;
            width: 100%;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            outline: none;
            padding: 4px;
        }

        .text-answer textarea:focus {
            border-color: #4a8aa0;
        }

        .timer-test {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            color: #6fd6b8;
            text-align: center;
            padding: 15px;
            background: #0a1818;
            border: 1px solid #1a4a4a;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .timer-test.warning {
            color: #f5c27a;
            border-color: #7a6a3a;
        }

        .timer-test.danger {
            color: #e8827a;
            border-color: #7a3a3a;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .score-display {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .score-display .score-number {
            font-size: 48px;
            font-weight: 700;
            color: #6fd6b8;
            font-family: 'Courier New', monospace;
        }

        .score-display .score-label {
            color: #7a9aa8;
            font-size: 14px;
            margin-top: 5px;
        }

        .nick-input-container {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .nick-input-container input {
            max-width: 300px;
            margin: 0 auto;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }

        .result-card {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.25s;
        }

        .result-card:hover {
            border-color: #3a6072;
        }

        .result-card .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .result-card .result-user {
            color: #9fc8d9;
            font-weight: 600;
            font-size: 16px;
        }

        .result-card .result-date {
            color: #5d8b9a;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .result-card .result-test {
            color: #7a9aa8;
            font-size: 14px;
        }

        .result-card .result-score {
            color: #6fd6b8;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .result-card .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending {
            color: #f5c27a;
            border: 1px solid #7a6a3a;
            background: #2e2818;
        }

        .status-checked {
            color: #6fd6b8;
            border: 1px solid #2b6a5c;
            background: #0f2e2a;
        }

        .status-revision {
            color: #e8827a;
            border: 1px solid #7a3a3a;
            background: #2e1818;
        }

        .result-actions {
            margin-top: 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-delete-result {
            background: #2a1a1a;
            border: 1px solid #6a2a2a;
            color: #f0b0b0;
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-delete-result:hover {
            background: #3a2222;
            border-color: #8a3a3a;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            color: #7a9aa8;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid #1f323d;
        }

        .admin-table td {
            color: #cce2ec;
            padding: 8px 12px;
            border-bottom: 1px solid #1f323d;
        }

        .admin-table tr:hover td {
            background: #0e161f;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.protected {
            color: #6fd6b8;
            border: 1px solid #2b6a5c;
            background: #0f2e2a;
        }

        .status-badge.normal {
            color: #8ab8d4;
            border: 1px solid #2a4a6a;
            background: #18222e;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #7a9aa8;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .question-item {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .question-item .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .option-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 4px;
        }

        .option-row input[type="text"] {
            flex: 1;
        }

        .option-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4a8aa0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-row .correct-label {
            color: #6fd6b8;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            flex-shrink: 0;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-group label {
            color: #cce2ec;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-group input[type="radio"] {
            accent-color: #4a8aa0;
            width: 16px;
            height: 16px;
        }

        .comment-box {
            background: #0e161e;
            border: 1px solid #21343f;
            border-radius: 8px;
            padding: 10px;
            color: #cce2ec;
            width: 100%;
            min-height: 80px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            outline: none;
            resize: vertical;
        }

        .comment-box:focus {
            border-color: #4a8aa0;
        }

        .answer-detail {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            background: #0a121a;
            border-left: 3px solid #1f323d;
        }

        .answer-detail.correct-answer {
            border-left-color: #3ccf9e;
        }

        .answer-detail.wrong-answer {
            border-left-color: #e8827a;
        }

        .answer-detail .q-label {
            color: #7a9aa8;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .answer-detail .q-text {
            color: #dcecf5;
            margin: 4px 0;
        }

        .answer-detail .user-answer {
            color: #f5c27a;
            font-size: 14px;
        }

        .answer-detail .correct-answer-text {
            color: #6fd6b8;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #5d8b9a;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-title">
            📋 ФСО ТЕСТИРОВАНИЕ
            <span class="badge">v3.0</span>
        </div>
        <div class="header-right">
            <div id="adminStatusContainer"></div>
            <div class="header-controls">
                <button class="nav-btn active" id="testsTab">📝 Тесты</button>
                <button class="nav-btn" id="resultsTab">📊 Результаты</button>
                <button class="nav-btn" id="editTab">⚙️ Редактирование</button>
            </div>
        </div>
    </div>

    <div class="content" id="mainContent">
        <div class="test-list" id="testList">
            <div class="flex-between mb-20">
                <h2 style="color:#9fc8d9;font-family:'Courier New',monospace;font-size:20px;">Доступные тесты</h2>
                <span style="color:#5d8b9a;font-size:13px;" id="testCount">0 тестов</span>
            </div>
            <div class="tests-grid" id="testsGrid"></div>
        </div>

        <div class="test-taking" id="testTaking">
            <button class="btn-primary mb-20" id="backToTests">← Назад к тестам</button>
            <div id="testContent"></div>
        </div>

        <div class="test-list hidden" id="resultsList">
            <div class="flex-between mb-20">
                <h2 style="color:#9fc8d9;font-family:'Courier New',monospace;font-size:20px;">Результаты тестов</h2>
                <span style="color:#5d8b9a;font-size:13px;" id="resultsCount">0 результатов</span>
            </div>
            <div id="resultsGrid" class="results-grid"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <button class="modal-close" id="closeEditModal">✕</button>
        <div class="modal-title">⚙️ Редактирование тестов</div>
        <div id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" class="form-control" id="loginInput" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль">
            </div>
            <button class="btn-primary mt-10" id="loginBtn">Войти</button>
            <div style="color:#e8827a;font-size:13px;margin-top:10px;font-family:'Courier New',monospace;" id="loginError"></div>
        </div>
        <div id="adminPanel" style="display:none;">
            <div class="flex-between mb-20">
                <span style="color:#9fc8d9;font-family:'Courier New',monospace;font-size:18px;">Панель управления</span>
                <button class="btn-danger" id="logoutBtn">Выйти</button>
            </div>

            <div class="flex-row mb-20">
                <button class="btn-success" id="newTestBtn">+ Новый тест</button>
                <button class="btn-success" id="continueDraftBtn">📂 Продолжить черновик</button>
                <button class="btn-warning" id="resetTestsBtn">🔄 Сбросить тесты</button>
            </div>

            <div id="testsAdminList"></div>

                <div class="flex-row mb-10">
                    <input type="text" class="form-control" style="flex:1;min-width:150px;" id="newAdminLogin" placeholder="Логин">
                    <input type="text" class="form-control" style="flex:1;min-width:150px;" id="newAdminPass" placeholder="Пароль">
                    <button class="btn-success" id="addAdminBtn">Добавить</button>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Логин</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminListBody"></tbody>
                </table>

<div class="modal-overlay" id="testEditorModal">
    <div class="modal">
        <button class="modal-close" id="closeTestEditor">✕</button>
        <div class="modal-title" id="editorTitle">Редактирование теста</div>

</div>

        <button class="modal-close" id="closeTestPasswordModal">✕</button>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" class="form-control" id="testPasswordInput" placeholder="Введите пароль">

        <div id="reviewContent"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const App = {
        tests: [],
        admins: [],
        results: [],
        currentUser: null,
        isLoggedIn: false,
        currentTest: null,
        testResults: null,
        testStartTime: null,
        testTimer: null,
        userNick: '',
        pendingTestId: null,
        draftData: null,

        init() {
            this.loadData();
            this.loadSession();
            this.loadDraft();
            this.renderTests();
            this.renderResults();
            this.setupEventListeners();
            this.updateTestCount();
            this.updateAdminStatus();
            
            if (this.isLoggedIn) {
                document.getElementById('editTab').click();
            }
        },

        loadData() {
            const saved = localStorage.getItem('fso_tests_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    this.tests = data.tests || [];
                    this.admins = data.admins || [];
                    this.results = data.results || [];
                    
                    const adminExists = this.admins.some(a => a.login === 'admin');
                    if (!adminExists) {
                        this.admins.unshift({ login: 'admin', password: '123mastyrbist', protected: true });
                    } else {
                        const adminIdx = this.admins.findIndex(a => a.login === 'admin');
                        if (this.admins[adminIdx]) {
                            this.admins[adminIdx].password = '123mastyrbist';
                            this.admins[adminIdx].protected = true;
                        }
                    }
                } catch(e) {
                    this.setDefaultData();
                }
            } else {
                this.setDefaultData();
            }
        },

        loadSession() {
            const session = localStorage.getItem('fso_session');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (data.login && data.loggedIn) {
                        const admin = this.admins.find(a => a.login === data.login);
                        if (admin) {
                            this.currentUser = admin;
                            this.isLoggedIn = true;
                        }
                    }
                } catch(e) {}
            }
        },

        saveSession() {
            if (this.isLoggedIn && this.currentUser) {
                localStorage.setItem('fso_session', JSON.stringify({
                    login: this.currentUser.login,
                    loggedIn: true
                }));
            } else {
                localStorage.removeItem('fso_session');
            }
        },

        loadDraft() {
            const draft = localStorage.getItem('fso_draft');
            if (draft) {
                try {
                    this.draftData = JSON.parse(draft);
                } catch(e) {
                    this.draftData = null;
                }
            }
        },

        saveDraft() {
            if (this.draftData) {
                localStorage.setItem('fso_draft', JSON.stringify(this.draftData));
            } else {
                localStorage.removeItem('fso_draft');
            }
        },

        saveResults() {
            localStorage.setItem('fso_results', JSON.stringify(this.results));
        },

        setDefaultData() {
            this.admins = [{ login: 'admin', password: '123mastyrbist', protected: true }];
            this.results = [];
            this.tests = [{
                id: 1,
                name: 'ФЗ ФСО - Основы государственной охраны',
                password: '',
                questions: [
                    {
                        type: 'choice',
                        text: 'Что такое государственная охрана согласно ФЗ ФСО?',
                        options: [
                            'Деятельность по обеспечению безопасности объектов государственной охраны',
                            'Деятельность по охране государственной границы',
                            'Деятельность по защите прав граждан',
                            'Деятельность по обеспечению общественного порядка'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'На основе каких принципов осуществляется государственная охрана?',
                        options: [
                            'Законность, уважение прав человека, централизованное руководство, взаимодействие',
                            'Законность, гласность, демократизм, независимость',
                            'Законность, открытость, децентрализация, самоуправление',
                            'Законность, приоритет интересов государства, единоначалие, закрытость'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Кто осуществляет руководство федеральным органом исполнительной власти в области государственной охраны?',
                        options: [
                            'Председатель Правительства Российской Федерации',
                            'Президент Российской Федерации',
                            'Губернатор Федерального округа',
                            'Министр обороны Российской Федерации'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Какие меры включает государственная охрана согласно статье 4?',
                        options: [
                            'Персональная охрана, связь, информация об угрозе, транспортное обслуживание',
                            'Только персональная охрана',
                            'Только защита охраняемых объектов',
                            'Только транспортное обслуживание'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Кому предоставляется государственная охрана в полном объеме со дня назначения на должность?',
                        options: [
                            'Председателю Правительства РФ и Губернаторам Федеральных округов',
                            'Всем депутатам Законодательных Собраний',
                            'Судьям Российской Федерации',
                            'Генеральному прокурору РФ'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Какие основные задачи органов государственной охраны?',
                        options: [
                            'Обеспечение безопасности объектов охраны, защита охраняемых объектов, пресечение правонарушений',
                            'Только обеспечение безопасности объектов охраны',
                            'Только защита охраняемых объектов',
                            'Только пресечение преступлений'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Могут ли сотрудники ФСО при исполнении обязанностей не предъявлять удостоверение?',
                        options: [
                            'Да, при сопровождении объектов государственной охраны',
                            'Нет, никогда',
                            'Да, всегда',
                            'Только по требованию прокурора'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Имеют ли право сотрудники ФСО на хранение и ношение любого оружия?',
                        options: [
                            'Да, разрешено хранение и ношение любого оружия для исполнения служебных обязанностей',
                            'Нет, только служебное оружие',
                            'Да, но только с разрешения прокурора',
                            'Нет, запрещено хранение оружия'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Могут ли сотрудники ФСО задерживать граждан, представляющих угрозу охраняемым лицам?',
                        options: [
                            'Да, до выяснения обстоятельств или для передачи правоохранителям',
                            'Нет, не имеют права задерживать',
                            'Да, но только по решению суда',
                            'Только если есть письменное разрешение'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Какие документы подлежат хранению в архивах Правительства РФ?',
                        options: [
                            'Документы о кадровом составе ФСО и методах деятельности',
                            'Только документы о кадровом составе',
                            'Только документы о тактике',
                            'Только документы о методах'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Вправе ли сотрудник ФСО запретить нахождение на охраняемых объектах в масках и бронежилетах?',
                        options: [
                            'Да, за исключением государственных служащих',
                            'Нет, не имеет права',
                            'Да, но только по решению суда',
                            'Только в отношении иностранных граждан'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Какой надзор осуществляется за деятельностью ФСО?',
                        options: [
                            'Судебный и прокурорский надзор',
                            'Только судебный',
                            'Только прокурорский',
                            'Только административный'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Сотрудник ФСО при обращении к гражданину обязан...',
                        options: [
                            'Предоставить удостоверение или жетон с номером',
                            'Назвать свое имя',
                            'Предоставить только жетон',
                            'Не обязан ничего предъявлять'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Сотрудник ФСО является...',
                        options: [
                            'Представителем власти и военнослужащим',
                            'Только военнослужащим',
                            'Только представителем власти',
                            'Гражданским служащим'
                        ],
                        correct: [0]
                    },
                    {
                        type: 'choice',
                        text: 'Может ли сотрудник ФСО отказать гражданину в доступе на охраняемый объект?',
                        options: [
                            'Да, при наличии запрещенных предметов или нарушений',
                            'Нет, не может',
                            'Да, но только по решению суда',
                            'Только в отношении иностранных граждан'
                        ],
                        correct: [0]
                    }
                ],
                timeLimit: 600,
                passingScore: 70,
                createdAt: Date.now()
            }];
            this.saveData();
            this.saveResults();
        },

        resetToDefault() {
            if (confirm('Вы уверены? Все текущие тесты и результаты будут удалены.')) {
                localStorage.removeItem('fso_tests_data');
                localStorage.removeItem('fso_results');
                localStorage.removeItem('fso_draft');
                this.tests = [];
                this.results = [];
                this.draftData = null;
                this.setDefaultData();
                this.renderTests();
                this.renderResults();
                this.updateTestCount();
                this.showToast('🔄 Тесты сброшены к стандартным');
            }
        },

        saveData() {
            localStorage.setItem('fso_tests_data', JSON.stringify({
                tests: this.tests,
                admins: this.admins,
                results: this.results
            }));
        },

        renderTests() {
            const grid = document.getElementById('testsGrid');
            grid.innerHTML = '';
            this.tests.forEach(test => {
                const card = document.createElement('div');
                card.className = 'test-card';
                const qCount = test.questions.length;
                const textQ = test.questions.filter(q => q.type === 'text').length;
                const hasPassword = test.password && test.password.length > 0;
                card.innerHTML = `
                    ${hasPassword ? '<div class="lock-badge">🔒</div>' : ''}
                    <div class="test-name">${test.name}</div>
                    <div class="test-meta">${qCount} вопросов (${textQ} с вводом текста)</div>
                    <div class="test-stats">
                        ⏱ ${Math.floor(test.timeLimit / 60)} мин | ✅ ${test.passingScore}% для прохождения
                        ${hasPassword ? ' | 🔒 Защищен паролем' : ''}
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (hasPassword) {
                        this.pendingTestId = test.id;
                        document.getElementById('testPasswordModal').classList.add('show');
                        document.getElementById('testPasswordInput').value = '';
                        document.getElementById('testPasswordError').textContent = '';
                        document.getElementById('testPasswordInput').focus();
                    } else {
                        this.startTest(test.id);
                    }
                });
                grid.appendChild(card);
            });
            this.updateTestCount();
        },

        updateTestCount() {
            document.getElementById('testCount').textContent = `${this.tests.length} тестов`;
        },

        updateAdminStatus() {
            const container = document.getElementById('adminStatusContainer');
            if (this.isLoggedIn && this.currentUser) {
                container.innerHTML = `
                    <div class="admin-status">
                        <span class="dot"></span>
                        <span>🔑 ${this.currentUser.login}</span>
                        <span style="color:#5d8b9a;font-weight:400;font-size:11px;">админ</span>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="admin-status" style="border-color:#3a3a3a;color:#5d8b9a;">
                        <span style="color:#5a5a5a;">👤 Гость</span>
                    </div>
                `;
            }
        },

        renderResults() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            if (this.results.length === 0) {
                grid.innerHTML = '<div class="empty-state">📭 Нет результатов тестов</div>';
                document.getElementById('resultsCount').textContent = '0 результатов';
                return;
            }

            const sortedResults = [...this.results].reverse();
            sortedResults.forEach(result => {
                const card = document.createElement('div');
                card.className = 'result-card';
                
                const statusMap = {
                    'pending': '⏳ Ожидает проверки',
                    'checked': '✅ Проверено',
                    'revision': '🔄 Требует пересмотра'
                };
                
                const statusClassMap = {
                    'pending': 'status-pending',
                    'checked': 'status-checked',
                    'revision': 'status-revision'
                };
                
                const test = this.tests.find(t => t.id === result.testId);
                const testName = test ? test.name : 'Тест удален';
                
                card.innerHTML = `
                    <div class="result-header">
                        <span class="result-user">👤 ${result.userNick}</span>
                        <span class="result-date">${result.date}</span>
                    </div>
                    <div class="result-test">📝 ${testName}</div>
                    <div class="flex-between mt-10">
                        <span class="result-score">${result.adminScore !== undefined ? result.adminScore : result.score}/5</span>
                        <span class="status-badge ${statusClassMap[result.status] || 'status-pending'}">${statusMap[result.status] || '⏳ Ожидает проверки'}</span>
                    </div>
                    ${result.adminComment ? `<div style="color:#7a9aa8;font-size:13px;margin-top:5px;">💬 ${result.adminComment}</div>` : ''}
                    <div class="result-actions">
                        <button class="btn-success-small" data-id="${result.id}">📋 Подробнее</button>
                        ${this.isLoggedIn ? `<button class="btn-warning" data-id="${result.id}">✏️ Проверить</button>` : ''}
                        ${this.isLoggedIn ? `<button class="btn-delete-result" data-id="${result.id}">🗑 Удалить</button>` : ''}
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            document.getElementById('resultsCount').textContent = `${this.results.length} результатов`;
            
            grid.querySelectorAll('.btn-success-small').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    this.showResultDetail(id);
                });
            });
            
            grid.querySelectorAll('.btn-warning').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    this.openReview(id);
                });
            });
            
            grid.querySelectorAll('.btn-delete-result').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Вы уверены, что хотите удалить этот результат?')) {
                        this.deleteResult(id);
                    }
                });
            });
        },

        deleteResult(id) {
            const idx = this.results.findIndex(r => r.id === id);
            if (idx !== -1) {
                this.results.splice(idx, 1);
                this.saveData();
                this.saveResults();
                this.renderResults();
                this.showToast('🗑 Результат удален');
            }
        },

        showResultDetail(id) {
            const result = this.results.find(r => r.id === id);
            if (!result) {
                this.showToast('❌ Результат не найден');
                return;
            }
            
            const test = this.tests.find(t => t.id === result.testId);
            if (!test) {
                this.showToast('❌ Тест не найден');
                return;
            }
            
            const statusMap = {
                'pending': '⏳ Ожидает проверки',
                'checked': '✅ Проверено',
                'revision': '🔄 Требует пересмотра'
            };
            
            let detailsHtml = '';
            result.answers.forEach((answer, idx) => {
                const q = test.questions[idx];
                if (!q) return;
                
                const isCorrect = answer.isCorrect;
                detailsHtml += `
                    <div class="answer-detail ${isCorrect ? 'correct-answer' : 'wrong-answer'}">
                        <div class="q-label">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Ввод текста'})</div>
                        <div class="q-text">${q.text}</div>
                        <div class="user-answer">Ответ пользователя: ${answer.userAnswer}</div>
                        ${!isCorrect && q.type === 'choice' ? `<div class="correct-answer-text">Правильный ответ: ${q.correct.map(i => q.options[i]).join(', ')}</div>` : ''}
                        ${!isCorrect && q.type === 'text' ? `<div class="correct-answer-text">Правильный ответ: ${q.correct.join(', ')}</div>` : ''}
                        <div style="color:${isCorrect ? '#6fd6b8' : '#e8827a'};font-size:12px;margin-top:4px;">
                            ${isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                        </div>
                    </div>
                `;
            });
            
            const modal = document.getElementById('reviewModal');
            document.getElementById('reviewContent').innerHTML = `
                <div class="flex-between mb-20">
                    <div>
                        <div style="color:#9fc8d9;font-size:18px;">👤 ${result.userNick}</div>
                        <div style="color:#7a9aa8;font-size:14px;">📝 ${test.name}</div>
                        <div style="color:#5d8b9a;font-size:13px;">📅 ${result.date}</div>
                    </div>
                    <div>
                        <div style="color:#6fd6b8;font-size:24px;font-weight:700;">${result.adminScore !== undefined ? result.adminScore : result.score}/5</div>
                        <div style="color:#7a9aa8;font-size:12px;">${result.adminScore !== undefined ? 'Ручная проверка' : 'Автоматическая'}</div>
                        <div style="color:#5d8b9a;font-size:12px;margin-top:4px;">${statusMap[result.status] || '⏳ Ожидает проверки'}</div>
                    </div>
                </div>
                ${result.adminComment ? `<div style="color:#f5c27a;font-size:14px;margin-bottom:15px;">💬 Комментарий: ${result.adminComment}</div>` : ''}
                ${result.reviewedBy ? `<div style="color:#5d8b9a;font-size:12px;margin-bottom:15px;">Проверил: ${result.reviewedBy} | ${result.reviewedAt || ''}</div>` : ''}
                <div style="margin-top:20px;">
                    <h4 style="color:#9fc8d9;font-family:'Courier New',monospace;margin-bottom:10px;">📊 Детали ответов</h4>
                    ${detailsHtml}
                </div>
                <div class="flex-row mt-20">
                    <button class="btn-primary" id="closeReviewDetail">Закрыть</button>
                    ${this.isLoggedIn ? `<button class="btn-warning" id="reviewFromDetail">✏️ Проверить</button>` : ''}
                    ${this.isLoggedIn ? `<button class="btn-delete-result" id="deleteFromDetail">🗑 Удалить</button>` : ''}
                </div>
            `;
            
            document.getElementById('closeReviewDetail').addEventListener('click', () => {
                document.getElementById('reviewModal').classList.remove('show');
            });
            
            const reviewBtn = document.getElementById('reviewFromDetail');
            if (reviewBtn) {
                reviewBtn.addEventListener('click', () => {
                    document.getElementById('reviewModal').classList.remove('show');
                    this.openReview(id);
                });
            }
            
            const deleteBtn = document.getElementById('deleteFromDetail');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    if (confirm('Вы уверены, что хотите удалить этот результат?')) {
                        document.getElementById('reviewModal').classList.remove('show');
                        this.deleteResult(id);
                    }
                });
            }
            
            modal.classList.add('show');
        },

        openReview(id) {
            const result = this.results.find(r => r.id === id);
            if (!result) {
                this.showToast('❌ Результат не найден');
                return;
            }
            
            const test = this.tests.find(t => t.id === result.testId);
            if (!test) {
                this.showToast('❌ Тест не найден');
                return;
            }
            
            let detailsHtml = '';
            result.answers.forEach((answer, idx) => {
                const q = test.questions[idx];

        startTest(testId) {
            const test = this.tests.find(t => t.id === testId);
            if (!test) return;

            this.currentTest = test;
            this.testResults = null;
            this.testStartTime = null;
            this.userNick = '';

            document.getElementById('testList').classList.add('hidden');
            document.getElementById('resultsList').classList.add('hidden');
            document.getElementById('testTaking').classList.add('active');

            this.showNickInput();
        },

        showNickInput() {
            const container = document.getElementById('testContent');
            container.innerHTML = `
                <div class="nick-input-container">
                    <h3 style="color:#9fc8d9;font-family:'Courier New',monospace;margin-bottom:15px;">👤 Введите ваше имя</h3>
                    <input type="text" class="form-control" id="nickInput" placeholder="Ваше имя или позывной" style="max-width:300px;margin:0 auto;">
                    <button class="btn-primary mt-10" id="startTestBtn">Начать тест</button>
                </div>
            `;

            document.getElementById('startTestBtn').addEventListener('click', () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) {
                    this.showToast('⚠️ Введите ваше имя');
                    document.getElementById('nickInput').classList.add('error');
                    return;
                }
                this.userNick = nick;
                document.getElementById('nickInput').classList.remove('error');
                this.renderTestQuestion(0);
            });

            document.getElementById('nickInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('startTestBtn').click();
            });
        },

        renderTestQuestion(index) {
            const container = document.getElementById('testContent');
            const test = this.currentTest;
            if (!test) return;

            if (index >= test.questions.length) {
                this.showResults();
                return;
            }

            const q = test.questions[index];
            const total = test.questions.length;
            const timeLeft = test.timeLimit - Math.floor((Date.now() - this.testStartTime) / 1000);

            let html = `
                <div class="flex-between mb-10">
                    <span style="color:#7a9aa8;font-family:'Courier New',monospace;">
                        👤 ${this.userNick} | Вопрос ${index + 1} из ${total}
                    </span>
                    <span style="color:#7a9aa8;font-family:'Courier New',monospace;">
                        Тип: ${q.type === 'choice' ? 'Выбор ответа' : 'Ввод текста'}
                    </span>
                </div>
                <div class="timer-test" id="testTimer">${this.formatTime(timeLeft > 0 ? timeLeft : 0)}</div>
                <div style="color:#dcecf5;font-size:18px;margin-bottom:15px;">${q.text}</div>
            `;

            if (q.type === 'choice') {
                q.options.forEach((opt, i) => {
                    const checked = this.testResults && this.testResults[index] && this.testResults[index].includes(i) ? 'checked' : '';
                    const inputType = q.correct.length > 1 ? 'checkbox' : 'radio';
                    html += `
                        <label class="option-label" data-index="${i}">
                            <input type="${inputType}" name="question" value="${i}" ${checked}>
                            ${opt}
                        </label>
                    `;
                });
                html += `
                    <div class="flex-row mt-20">
                        <button class="btn-primary" id="nextQuestionBtn">${index === total - 1 ? 'Завершить' : 'Далее →'}</button>
                        ${index > 0 ? `<button class="btn-primary" id="prevQuestionBtn">← Назад</button>` : ''}
                    </div>
                `;
            } else {
                const val = this.testResults && this.testResults[index] ? this.testResults[index][0] || '' : '';
                html += `
                    <div class="text-answer">
                        <textarea rows="3" id="textAnswer" placeholder="Введите ваш ответ...">${val}</textarea>
                    </div>
                    <div class="flex-row mt-20">
                        <button class="btn-primary" id="nextQuestionBtn">${index === total - 1 ? 'Завершить' : 'Далее →'}</button>
                        ${index > 0 ? `<button class="btn-primary" id="prevQuestionBtn">← Назад</button>` : ''}
                    </div>
                `;
            }

            container.innerHTML = html;

            if (!this.testStartTime) {
                this.testStartTime = Date.now();
                if (this.testTimer) clearInterval(this.testTimer);
                this.testTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.testStartTime) / 1000);
                    const remaining = test.timeLimit - elapsed;
                    if (remaining <= 0) {
                        clearInterval(this.testTimer);
                        this.finishTest();
                        return;
                    }
                    const timerEl = document.getElementById('testTimer');
                    if (timerEl) {
                        timerEl.textContent = this.formatTime(remaining);
                        if (remaining < 30) timerEl.className = 'timer-test danger';
                        else if (remaining < 60) timerEl.className = 'timer-test warning';
                        else timerEl.className = 'timer-test';
                    }
                }, 1000);
            }

            const nextBtn = document.getElementById('nextQuestionBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (q.type === 'choice') {
                        const selected = document.querySelectorAll('input[name="question"]:checked');
                        if (selected.length === 0) {
                            this.showToast('⚠️ Выберите ответ');
                            return;
                        }
                        const values = Array.from(selected).map(el => parseInt(el.value));
                        if (!this.testResults) this.testResults = [];
                        this.testResults[index] = values;
                    } else {
                        const textarea = document.getElementById('textAnswer');
                        if (textarea) {
                            const val = textarea.value.trim();
                            if (!val) {
                                this.showToast('⚠️ Введите ответ');
                                return;
                            }
                            if (!this.testResults) this.testResults = [];
                            this.testResults[index] = [val];
                        }
                    }
                    this.renderTestQuestion(index + 1);
                });
            }

            const prevBtn = document.getElementById('prevQuestionBtn');
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    this.renderTestQuestion(index - 1);
                });
            }
        },

        finishTest() {
            if (this.testTimer) {
                clearInterval(this.testTimer);
                this.testTimer = null;
            }
            this.showResults();
        },

        showResults() {
            if (this.testTimer) {
                clearInterval(this.testTimer);
                this.testTimer = null;
            }
            const container = document.getElementById('testContent');
            const test = this.currentTest;
            
            let correctCount = 0;
            let totalQuestions = test.questions.length;
            let details = [];
            let answerDetails = [];

            test.questions.forEach((q, idx) => {
                const userAnswer = this.testResults && this.testResults[idx] ? this.testResults[idx] : null;
                let isCorrect = false;
                let userAnswerStr = '';

                if (q.type === 'choice') {
                    if (userAnswer) {
                        const correctArr = q.correct || [];
                        const sortedUser = userAnswer.slice().sort();
                        const sortedCorrect = correctArr.slice().sort();
                        isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
                        userAnswerStr = userAnswer.map(i => q.options[i] || 'не выбран').join(', ');
                    } else {
                        userAnswerStr = 'не отвечено';
                    }
                } else {
                    if (userAnswer && userAnswer.length > 0) {
                        const userText = userAnswer[0].toLowerCase().trim();
                        const correctTexts = (q.correct || []).map(c => c.toLowerCase().trim());
                        isCorrect = correctTexts.some(c => userText.includes(c) || c.includes(userText));
                        userAnswerStr = userAnswer[0] || 'не введено';
                    } else {
                        userAnswerStr = 'не введено';
                    }
                }

                if (isCorrect) correctCount++;
                
                details.push({
                    question: q.text,
                    type: q.type === 'choice' ? 'Выбор' : 'Ввод текста',
                    userAnswer: userAnswerStr,
                    isCorrect: isCorrect
                });
                
                answerDetails.push({
                    userAnswer: userAnswerStr,
                    isCorrect: isCorrect
                });
            });

            const percentage = Math.round((correctCount / totalQuestions) * 100);
            const passed = percentage >= test.passingScore;
            const score = Math.round((correctCount / totalQuestions) * 5);

            const result = {
                id: Date.now(),
                testId: test.id,
                userNick: this.userNick,
                date: new Date().toLocaleString(),
                score: score,
                percentage: percentage,
                passed: passed,
                answers: answerDetails,
                status: 'pending',
                adminScore: null,
                adminComment: null,
                reviewedBy: null,
                reviewedAt: null
            };
            
            this.results.push(result);
            this.saveData();
            this.saveResults();

            let html = `
                <div class="score-display">
                    <div style="color:#7a9aa8;font-size:16px;margin-bottom:10px;">👤 ${this.userNick}</div>
                    <div class="score-number">${score}/5</div>
                    <div class="score-label">Баллов</div>
                    <div style="color:#7a9aa8;font-size:18px;margin-top:10px;">${percentage}%</div>
                    <div style="color:${passed ? '#6fd6b8' : '#e8827a'};font-size:16px;margin-top:5px;font-weight:600;">
                        ${passed ? '✅ ТЕСТ СДАН' : '❌ ТЕСТ НЕ СДАН'}
                    </div>
                    <div style="color:#5d8b9a;font-size:13px;margin-top:10px;">
                        Правильных ответов: ${correctCount} из ${totalQuestions}
                    </div>
                    <div style="color:#f5c27a;font-size:13px;margin-top:10px;">
                        ⏳ Результат отправлен на проверку администратору
                    </div>
                </div>
                <div style="margin-top:20px;">
                    <h4 style="color:#9fc8d9;font-family:'Courier New',monospace;margin-bottom:10px;">📊 Детали ответов</h4>
            `;

            details.forEach((d, i) => {
                html += `
                    <div style="background:#0e161f;border:1px solid ${d.isCorrect ? '#2a5a3a' : '#5a2a2a'};border-radius:8px;padding:10px;margin-bottom:8px;">
                        <div style="color:#7a9aa8;font-size:12px;font-family:'Courier New',monospace;">Вопрос ${i+1} (${d.type})</div>
                        <div style="color:#cce2ec;font-size:14px;">${d.question}</div>
                        <div style="color:#5d8b9a;font-size:13px;margin-top:4px;">Ответ: ${d.userAnswer}</div>
                        <div style="color:${d.isCorrect ? '#6fd6b8' : '#e8827a'};font-size:12px;font-weight:600;margin-top:2px;">
                            ${d.isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
                <div class="flex-row mt-20">
                    <button class="btn-primary" id="finishTestBtn">📋 Завершить</button>
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('finishTestBtn').addEventListener('click', () => {
                document.getElementById('testList').classList.remove('hidden');
                document.getElementById('resultsList').classList.add('hidden');
                document.getElementById('testTaking').classList.remove('active');
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.renderTests();
                this.renderResults();
            });
        },

        formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        },
