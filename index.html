<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ФСО-Арбат | Доклады и Тесты</title>
    <style>
        /* ——— RESET & VARIABLES ——— */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-body: #0b0f15;
            --bg-card: #121a24;
            --bg-card-hover: #18222e;
            --bg-input: #0d151f;
            --border: #1f2d3a;
            --border-hover: #2f4255;
            --text-main: #dfeaf2;
            --text-muted: #7b9aad;
            --text-dim: #456070;
            --green: #4dd9b0;
            --green-dim: #1a3a30;
            --gold: #f0c87a;
            --gold-dim: #2a2418;
            --red: #e8827a;
            --red-dim: #2a1a18;
            --blue: #5a9ab0;
            --blue-dim: #1a2a38;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 10px 40px rgba(0,0,0,0.7);
            --transition: .22s ease;
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            background-image: radial-gradient(ellipse at 30% 0%, #13202a 0%, transparent 75%);
        }

        .app {
            max-width: 1240px;
            margin: 0 auto;
        }

        /* ——— HEADER ——— */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
            position: sticky;
            top: 16px;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: .5px;
            background: linear-gradient(135deg, #a8d4e8, #5edbbc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo .badge {
            background: var(--bg-body);
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid var(--border);
            -webkit-text-fill-color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ——— ПЛАШКИ-КНОПКИ МЕНЮ (как на форуме) ——— */
        .menu-plate {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            border-radius: 60px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: .3px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            user-select: none;
        }

        .menu-plate:hover {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: var(--bg-card-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .menu-plate.active {
            background: var(--blue-dim);
            border-color: var(--blue);
            color: var(--text-main);
            box-shadow: 0 0 30px rgba(90, 154, 176, 0.12);
        }

        .menu-plate .icon { font-size: 18px; }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px 4px 10px;
            border-radius: 60px;
            background: var(--green-dim);
            border: 1px solid #2a5a4a;
            color: var(--green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 12px rgba(77, 217, 176, 0.3);
            animation: pulse-dot 1.8s infinite ease-in-out;
        }

        .status-pill .dot.off {
            background: #4a5a5a;
            box-shadow: none;
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .3; transform: scale(.8); }
        }

        /* ——— КОНТЕНТ ——— */
        .content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: var(--shadow);
            min-height: 460px;
        }

        .module { display: block; animation: fadeUp .3s ease; }
        .module.hidden { display: none; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ——— ДОКЛАД (стили адаптированы) ——— */
        .report-wrap {
            background: var(--bg-body);
            border-radius: var(--radius);
            padding: 20px 22px;
            border: 1px solid var(--border);
        }

        .report-wrap .rheader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 18px;
        }

        .report-wrap .rtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #b0d4e0;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .report-wrap .rtitle .badge {
            background: var(--blue-dim);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #7ab0c0;
            border: 1px solid #2a4857;
        }

        .r-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            color: var(--green);
            background: #0a1818;
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid #1a4a4a;
            min-width: 90px;
            text-align: center;
        }
        .r-timer.inactive { color: #3a5a5a; border-color: #1a2a2a; }

        .r-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 16px;
            border-radius: 40px;
            background: #14242e;
            border: 1px solid #1e3845;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #6d9aaa;
        }
        .r-status .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 12px rgba(77,217,176,0.3);
            animation: pulse 1.8s infinite;
        }
        .r-status .dot.off { background: #5a5a5a; box-shadow: none; animation: none; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }

        .fields {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .field label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: .4px;
        }
        .field label .req { color: var(--red); margin-left: 4px; }

        .field input, .field select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            font-family: 'Inter', sans-serif;
        }
        .field input:focus, .field select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(90, 154, 176, 0.12);
        }
        .field input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(232, 130, 122, 0.15); }
        .field .hint { color: var(--red); font-size: 11px; font-family: 'JetBrains Mono', monospace; height: 16px; }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid var(--border);
            background: var(--bg-body);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: .8px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            flex: 1 1 auto;
            justify-content: center;
        }
        .btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-main);
            background: var(--bg-card-hover);
            transform: translateY(-1px);
        }
        .btn:disabled { opacity: .4; cursor: not-allowed; }

        .btn-primary {
            background: var(--blue-dim);
            border-color: var(--blue);
            color: var(--text-main);
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--blue);
            border-color: var(--blue);
            box-shadow: 0 0 30px rgba(90, 154, 176, 0.15);
        }

        .btn-danger {
            background: var(--red-dim);
            border-color: #5a2a2a;
            color: var(--red);
        }
        .btn-danger:hover:not(:disabled) {
            background: #3a1a1a;
            border-color: var(--red);
        }

        .btn-secondary {
            background: #1a1a2a;
            border-color: #2a2a5a;
            color: #9090d0;
            flex: 0.4;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #2a2a3a;
            border-color: #4a4a7a;
        }

        .reports-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }

        .r-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 16px;
            transition: var(--transition);
        }
        .r-item:hover { border-color: var(--border-hover); }

        .r-item .rnum {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            background: #14242e;
            padding: 1px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .r-item .rtitle-sm {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: #6f98a8;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .r-item .rbody {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-main);
            word-break: break-word;
        }
        .r-item .rbody .label { color: var(--text-muted); }
        .r-item .rbody .val { color: var(--text-main); }
        .r-item .rbody .tag {
            display: inline-block;
            padding: 0 10px;
            border-radius: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
        }
        .status-0 { color: var(--green); border:1px solid #2b6a5c; background:#0f2e2a; }
        .status-1 { color: var(--gold); border:1px solid #7a6a3a; background:#2e2818; }
        .status-2 { color: var(--red); border:1px solid #7a3a3a; background:#2e1818; }
        .status-3 { color: #8ab8d4; border:1px solid #2a4a6a; background:#18222e; }
        .status-4 { color: #c4a0d4; border:1px solid #5a3a7a; background:#22182e; }

        .r-item .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .r-item .copy-btn:hover:not(:disabled) {
            border-color: var(--blue);
            color: var(--text-main);
            background: var(--blue-dim);
        }
        .r-item .copy-btn:disabled { opacity: .3; cursor: not-allowed; }
        .r-item.empty .rbody { color: var(--text-dim); }

        @media (max-width: 700px) {
            .r-item { grid-template-columns: 1fr; gap: 4px; }
            .fields { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .fields { grid-template-columns: 1fr; }
            .btn-row .btn { flex: 1 1 100%; }
        }

        /* ——— ТЕСТЫ (адаптация под модуль) ——— */
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
            margin-top: 14px;
        }

        .t-card {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .t-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--blue), var(--green));
            opacity: 0;
            transition: var(--transition);
        }
        .t-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
        .t-card:hover::before { opacity: 1; }

        .t-card .tname {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            padding-right: 30px;
            margin-bottom: 4px;
        }
        .t-card .tmeta {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .t-card .tstats {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 16px;
        }
        .t-card .lock { position: absolute; top: 14px; right: 16px; font-size: 15px; color: var(--gold); }

        .test-taking { display: none; }
        .test-taking.active { display: block; }
        .test-list { display: block; }
        .test-list.hidden { display: none; }

        .timer-test {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 700;
            color: var(--green);
            text-align: center;
            padding: 12px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .timer-test.warning { color: var(--gold); border-color: #5a4a2a; }
        .timer-test.danger { color: var(--red); border-color: #5a2a2a; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .q-progress {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .q-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .opt-label {
            display: block;
            padding: 10px 14px;
            margin: 4px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-size: 14px;
        }
        .opt-label:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.02); }
        .opt-label input { margin-right: 10px; accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; }
        .opt-label.selected { border-color: var(--blue); background: var(--blue-dim); color: var(--text-main); }

        .text-answer textarea {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-main);
            width: 100%;
            resize: vertical;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            min-height: 80px;
            transition: var(--transition);
        }
        .text-answer textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(90,154,176,0.1); }

        .score-box {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
        }
        .score-box .snum {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), #5ce6b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }
        .score-box .slabel { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
        .score-box .spercent { color: var(--text-muted); font-size: 18px; font-weight: 600; margin-top: 6px; }
        .score-box .sresult {
            font-size: 16px; font-weight: 700; margin-top: 6px;
            padding: 4px 16px; border-radius: 40px; display: inline-block;
        }
        .score-box .sresult.passed { color: var(--green); background: var(--green-dim); }
        .score-box .sresult.failed { color: var(--red); background: var(--red-dim); }
        .score-box .sdetail { color: var(--text-dim); font-size: 13px; margin-top: 8px; }
        .score-box .spending { color: var(--gold); font-size: 13px; margin-top: 8px; padding: 6px 14px; border:1px solid #5a4a2a; border-radius:40px; display:inline-block; background: var(--gold-dim); }

        .a-detail {
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border-left: 3px solid var(--border);
        }
        .a-detail.correct { border-left-color: var(--green); }
        .a-detail.wrong { border-left-color: var(--red); }
        .a-detail .ql { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
        .a-detail .qt { color: var(--text-main); margin: 4px 0; font-size: 14px; }
        .a-detail .ua { color: var(--gold); font-size: 13px; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
        .empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-muted); }

        .nick-box {
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            max-width: 360px;
            margin: 0 auto;
        }
        .nick-box h3 { color: var(--text-main); font-size: 18px; margin-bottom: 12px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-main); padding: 10px 24px; border-radius: 60px;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
            opacity: 0; transition: opacity .4s ease; pointer-events: none;
            z-index: 999; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .toast.show { opacity: 1; }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: stretch; gap: 12px; }
            .header-actions { justify-content: center; flex-wrap: wrap; }
            .content { padding: 16px; }
            .report-wrap { padding: 14px; }
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .logo { font-size: 18px; }
            .menu-plate { font-size: 12px; padding: 6px 14px; }
            .content { padding: 10px; }
            .report-wrap { padding: 10px; }
        }

        /* утилиты */
        .flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .gap-8 { gap: 8px; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mb-8 { margin-bottom: 8px; }
        .w-full { width: 100%; }
        .btn-block { width: 100%; justify-content: center; }
        .btn-sm { padding: 5px 14px; font-size: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app">

    <!-- ШАПКА -->
    <header class="header">
        <div class="logo">
            ⚡ ФСО-АРБАТ
            <span class="badge">Доклады &amp; Тесты</span>
        </div>
        <div class="header-actions">
            <span class="status-pill" id="adminPill">
                <span class="dot off" id="adminDot"></span>
                <span id="adminLabel">Гость</span>
            </span>
            <button class="menu-plate active" data-module="report">
                <span class="icon">📋</span> Доклад
            </button>
            <button class="menu-plate" data-module="test">
                <span class="icon">📝</span> Тесты
            </button>
        </div>
    </header>

    <!-- КОНТЕНТ -->
    <div class="content">

        <!-- МОДУЛЬ ДОКЛАД -->
        <div class="module" id="module-report">
            <div class="report-wrap">
                <div class="rheader">
                    <div class="rtitle">
                        🔱 ГЕНЕРАТОР ДОКЛАДА
                        <span class="badge">ФСО-Арбат</span>
                    </div>
                    <div class="flex">
                        <button class="menu-plate" id="soundToggle" style="padding:4px 14px;font-size:12px;">🔊 Звук</button>
                        <span class="r-timer inactive" id="timerDisplay">--:--:--</span>
                        <span class="r-status">
                            <span class="dot off" id="statusDot"></span>
                            <span id="statusText">ОЖИДАНИЕ</span>
                        </span>
                    </div>
                </div>

                <div class="fields">
                    <div class="field">
                        <label>▸ Тип службы</label>
                        <select id="serviceType"><option value="post">Пост</option></select>
                    </div>
                    <div class="field">
                        <label id="locationLabel">▸ Название поста</label>
                        <select id="locationSelect">
                            <option>Дом Правительства</option><option>Вечный Огонь</option>
                            <option>КПП-1</option><option>КПП-2</option>
                            <option>КПП-3</option><option>Холл ФСО</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>▸ Звание</label>
                        <select id="rank">
                            <option>Рядовой</option><option>Ефрейтор</option>
                            <option>Младший сержант</option><option>Сержант</option>
                            <option>Старший сержант</option><option>Старшина</option>
                            <option>Прапорщик</option><option>Старший прапорщик</option>
                            <option>Младший лейтенант</option><option>Лейтенант</option>
                            <option>Старший лейтенант</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>▸ Имя Фамилия <span class="req">*</span></label>
                        <input type="text" id="surname" placeholder="Введите имя и фамилию" />
                        <div class="hint" id="surnameError"></div>
                    </div>
                    <div class="field">
                        <label>▸ Статус</label>
                        <select id="statusStart">
                            <option value="0">Код 0</option>
                            <option value="1" selected>Код 1</option>
                            <option value="2">Код 2</option>
                            <option value="3">Код 3</option>
                            <option value="4">Код 4</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>▸ Состав</label>
                        <select id="sostavSelect">
                            <option>1</option><option>2</option>
                            <option selected>3</option><option>4</option><option>5</option>
                        </select>
                    </div>
                </div>

                <div class="btn-row">
                    <button class="btn btn-primary" id="mainBtn"><span class="icon">⚡</span> ЗАСТУПИТЬ</button>
                    <button class="btn btn-secondary" id="clearBtn"><span class="icon">🗑</span> ОЧИСТИТЬ</button>
                </div>

                <div class="reports-list" id="reportsGrid">
                    <div class="r-item empty">
                        <span class="rnum">№1</span>
                        <span class="rtitle-sm">ЗАСТУПИЛ</span>
                        <div class="rbody">Ожидание заступления...</div>
                        <button class="copy-btn" disabled>📋 Копировать</button>
                    </div>
                    <div class="r-item empty">
                        <span class="rnum">№2</span>
                        <span class="rtitle-sm">15</span>
                        <div class="rbody">Ожидание заступления...</div>
                        <button class="copy-btn" disabled>📋 Копировать</button>
                    </div>
                    <div class="r-item empty">
                        <span class="rnum">№3</span>
                        <span class="rtitle-sm">СДАЛ</span>
                        <div class="rbody">Ожидание заступления...</div>
                        <button class="copy-btn" disabled>📋 Копировать</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- МОДУЛЬ ТЕСТЫ -->
        <div class="module hidden" id="module-test">
            <div id="testApp">
                <div class="test-list" id="testList">
                    <div class="flex" style="justify-content:space-between;margin-bottom:12px;">
                        <span style="font-size:18px;font-weight:700;">📋 Доступные тесты</span>
                        <span style="font-size:13px;color:var(--text-dim);background:var(--bg-body);padding:1px 14px;border-radius:40px;border:1px solid var(--border);" id="testCount">0</span>
                    </div>
                    <div class="test-grid" id="testsGrid"></div>
                </div>
                <div class="test-taking" id="testTaking">
                    <button class="btn btn-primary" id="backToTests" style="margin-bottom:12px;">← Назад</button>
                    <div id="testContent"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        'use strict';

        // ============================================================
        // 0. Переключение модулей (плашки)
        // ============================================================
        const mods = {
            report: document.getElementById('module-report'),
            test: document.getElementById('module-test')
        };
        const plates = document.querySelectorAll('.menu-plate[data-module]');

        plates.forEach(p => {
            p.addEventListener('click', function() {
                plates.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const m = this.dataset.module;
                Object.keys(mods).forEach(k => mods[k].classList.toggle('hidden', k !== m));
                if (m === 'test') renderTests();
            });
        });

        // ============================================================
        // 1. Доклад (полный функционал)
        // ============================================================
        const report = (function() {
            const rank = document.getElementById('rank');
            const surname = document.getElementById('surname');
            const surnameError = document.getElementById('surnameError');
            const serviceType = document.getElementById('serviceType');
            const locationSelect = document.getElementById('locationSelect');
            const locationLabel = document.getElementById('locationLabel');
            const statusStart = document.getElementById('statusStart');
            const sostav = document.getElementById('sostavSelect');
            const mainBtn = document.getElementById('mainBtn');
            const clearBtn = document.getElementById('clearBtn');
            const grid = document.getElementById('reportsGrid');
            const timerDisplay = document.getElementById('timerDisplay');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const toast = document.getElementById('toast');
            const soundToggle = document.getElementById('soundToggle');

            let soundEnabled = true;
            let isOnDuty = false;
            let dutyStartTime = null;
            let timerInterval = null;

            const statuses = [
                { code: 'Код 0', cls: 'status-0' },
                { code: 'Код 1', cls: 'status-1' },
                { code: 'Код 2', cls: 'status-2' },
                { code: 'Код 3', cls: 'status-3' },
                { code: 'Код 4', cls: 'status-4' }
            ];

            function play(freq, dur, type='sine', vol=.3) {
                if (!soundEnabled) return;
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = type; osc.frequency.value = freq;
                    gain.gain.value = vol;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                    osc.stop(ctx.currentTime + dur);
                } catch(e) {}
            }
            function playStart() { play(800,.15); setTimeout(()=>play(1200,.15),150); }
            function playEnd() { play(600,.4,'sawtooth',.2); setTimeout(()=>play(400,.3,'sawtooth',.15),300); }
            function playCopy() { play(1200,.05,'sine',.15); }
            function playErr() { play(300,.3,'sawtooth',.2); setTimeout(()=>play(250,.3,'sawtooth',.15),250); }
            function playClear() { play(500,.1); setTimeout(()=>play(400,.1),100); }

            soundToggle.addEventListener('click', function() {
                soundEnabled = !soundEnabled;
                this.textContent = soundEnabled ? '🔊 Звук' : '🔇 Звук выкл';
                if (soundEnabled) play(800,.1);
            });

            function getStatus(i) { return statuses[i] || statuses[0]; }
            function getSostav() { return sostav.value; }
            function getLocation() { return locationSelect.value; }
            function fmtTime(d) { return d.toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit', hour12:false}); }
            function fmtDuration(start, end) {
                let diff = Math.floor((end - start) / 1000);
                const h = Math.floor(diff/3600); diff -= h*3600;
                const m = Math.floor(diff/60); const s = diff - m*60;
                return h > 0 ? `${h} ч ${m} мин ${s} сек` : `${m} мин ${s} сек`;
            }

            function disableFields(disabled) {
                [rank, serviceType, locationSelect, statusStart, sostav].forEach(el => el.disabled = disabled);
                surname.disabled = disabled;
            }

            function updateUI(active) {
                if (active) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'НА СЛУЖБЕ';
                    timerDisplay.className = 'r-timer';
                    mainBtn.innerHTML = '<span class="icon">📤</span> СДАТЬ';
                    mainBtn.className = 'btn btn-danger';
                    disableFields(true);
                } else {
                    statusDot.className = 'dot off';
                    statusText.textContent = 'ОЖИДАНИЕ';
                    timerDisplay.className = 'r-timer inactive';
                    timerDisplay.textContent = '--:--:--';
                    mainBtn.innerHTML = '<span class="icon">⚡</span> ЗАСТУПИТЬ';
                    mainBtn.className = 'btn btn-primary';
                    disableFields(false);
                }
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            function copyText(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => { playCopy(); showToast('✅ Скопировано'); })
                        .catch(() => fallbackCopy(text));
                } else fallbackCopy(text);
            }
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); playCopy(); showToast('✅ Скопировано'); } catch(e) { showToast('❌ Ошибка'); }
                document.body.removeChild(ta);
            }

            function buildHTML(text, status) {
                const parts = text.split('|');
                if (parts.length >= 4) {
                    const l1 = parts[0].trim(), l2 = parts[1]?.trim() || '', l3 = parts[2]?.trim() || '', sp = parts[3]?.trim() || '';
                    const tag = `<span class="tag ${status.cls}">${sp}</span>`;
                    let res = `<span class="label">${l1}</span>`;
                    if (l2) res += `<br><span class="val">${l2}</span>`;
                    if (l3) res += ` | <span class="val">${l3}</span>`;
                    res += ` ${tag}`;
                    return res;
                }
                return text;
            }

            function renderReports(r1, r2, r3, status) {
                const items = [
                    { num:'№1', title:'ЗАСТУПИЛ', text:r1 },
                    { num:'№2', title:'15', text:r2 },
                    { num:'№3', title:'СДАЛ', text:r3 }
                ];
                grid.innerHTML = '';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'r-item';
                    const num = document.createElement('span');
                    num.className = 'rnum'; num.textContent = item.num;
                    const title = document.createElement('span');
                    title.className = 'rtitle-sm'; title.textContent = item.title;
                    const body = document.createElement('div');
                    body.className = 'rbody';
                    body.innerHTML = buildHTML(item.text, status);
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.textContent = '📋 Копировать';
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        copyText(item.text);
                        this.classList.add('copied');
                        setTimeout(() => this.classList.remove('copied'), 1500);
                    });
                    div.append(num, title, body, btn);
                    grid.appendChild(div);
                });
            }

            function renderEmpty() {
                const empty = [
                    { num:'№1', title:'ЗАСТУПИЛ', text:'Ожидание заступления...' },
                    { num:'№2', title:'15', text:'Ожидание заступления...' },
                    { num:'№3', title:'СДАЛ', text:'Ожидание заступления...' }
                ];
                grid.innerHTML = '';
                empty.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'r-item empty';
                    const num = document.createElement('span');
                    num.className = 'rnum'; num.textContent = item.num;
                    const title = document.createElement('span');
                    title.className = 'rtitle-sm'; title.textContent = item.title;
                    const body = document.createElement('div');
                    body.className = 'rbody'; body.textContent = item.text;
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn'; btn.textContent = '📋 Копировать';
                    btn.disabled = true;
                    div.append(num, title, body, btn);
                    grid.appendChild(div);
                });
            }

            function generateReport(type, rankVal, surnameVal, loc, status, time, s) {
                const act = { start:'Заступил на пост', end:'Сдал пост', interim:'Пост' };
                const ss = `Состав: ${s}`;
                if (type === 'start') return `Докладывает ${rankVal} ${surnameVal} | ${act.start}: ${loc} | ${ss} | Статус: ${status.code} | Время: ${fmtTime(time)}`;
                if (type === 'end') return `Докладывает ${rankVal} ${surnameVal} | ${act.end}: ${loc} | ${ss} | Статус: ${status.code} | Время: ${fmtTime(time)}`;
                return `Докладывает ${rankVal} ${surnameVal} | ${act.interim}: ${loc} | ${ss} | Статус: ${status.code} | Время на службе: ${fmtDuration(dutyStartTime, new Date())}`;
            }

            function startDuty() {
                const name = surname.value.trim();
                if (!name) {
                    surname.classList.add('error');
                    surnameError.textContent = '⚠️ Имя и Фамилия обязательна';
                    surname.focus();
                    playErr();
                    return;
                }
                surname.classList.remove('error');
                surnameError.textContent = '';

                const r = rank.value;
                const loc = getLocation();
                const st = getStatus(parseInt(statusStart.value));
                const s = getSostav();
                const now = new Date();
                dutyStartTime = now;
                isOnDuty = true;

                const r1 = generateReport('start', r, name, loc, st, now, s);
                const r2 = `Докладывает ${r} ${name} | Пост: ${loc} | Состав: ${s} | Статус: ${st.code} | 15 минут`;
                const r3 = generateReport('end', r, name, loc, st, now, s);

                renderReports(r1, r2, r3, st);
                updateUI(true);
                playStart();

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (dutyStartTime && isOnDuty) {
                        timerDisplay.textContent = fmtDuration(dutyStartTime, new Date());
                    }
                }, 1000);
                showToast('✅ Заступил на службу');
            }

            function endDuty() {
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                const now = new Date();
                const r = rank.value;
                const name = surname.value.trim() || '';
                const loc = getLocation();
                const st = getStatus(parseInt(statusStart.value));
                const s = getSostav();

                const r1 = generateReport('start', r, name, loc, st, dutyStartTime, s);
                const r2 = generateReport('interim', r, name, loc, st, now, s);
                const r3 = generateReport('end', r, name, loc, st, now, s);

                renderReports(r1, r2, r3, st);
                isOnDuty = false;
                dutyStartTime = null;
                updateUI(false);
                playEnd();
                showToast('📤 Служба завершена');
            }

            mainBtn.addEventListener('click', function() {
                if (isOnDuty) endDuty(); else startDuty();
            });

            clearBtn.addEventListener('click', function() {
                if (isOnDuty) { if (!confirm('Завершить текущую службу?')) return; endDuty(); }
                surname.value = '';
                surname.classList.remove('error');
                surnameError.textContent = '';
                renderEmpty();
                playClear();
                showToast('🗑 Очищено');
            });

            surname.addEventListener('input', function() {
                if (this.value.trim()) { this.classList.remove('error'); surnameError.textContent = ''; }
            });

            // инициализация
            renderEmpty();
            updateUI(false);

            return { renderEmpty };
        })();

        // ============================================================
        // 2. Тесты (упрощённая версия, работает полностью)
        // ============================================================
        let testData = { tests: [], results: [] };

        function loadTestData() {
            const saved = localStorage.getItem('fso_tests_data');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    testData.tests = d.tests || [];
                    testData.results = d.results || [];
                    if (testData.tests.length === 0) setDefaultTests();
                } catch(e) { setDefaultTests(); }
            } else { setDefaultTests(); }
        }

        function saveTestData() {
            localStorage.setItem('fso_tests_data', JSON.stringify({
                tests: testData.tests,
                results: testData.results
            }));
        }

        function setDefaultTests() {
            testData.tests = [
                {
                    id: 1,
                    name: 'ЦСН СПБ - ФЗ ФСО и УК РФ',
                    password: '',
                    questions: [
                        { type: 'choice', text: 'Что такое государственная охрана согласно ФЗ ФСО?', options: ['Деятельность по обеспечению безопасности объектов государственной охраны', 'Деятельность по охране государственной границы', 'Деятельность по защите прав граждан', 'Деятельность по обеспечению общественного порядка'], correct: [0] },
                        { type: 'choice', text: 'На основе каких принципов осуществляется государственная охрана?', options: ['Законность, уважение прав человека, централизованное руководство, взаимодействие', 'Законность, гласность, демократизм, независимость', 'Законность, открытость, децентрализация, самоуправление', 'Законность, приоритет государства, единоначалие, закрытость'], correct: [0] },
                        { type: 'choice', text: 'Кто осуществляет руководство федеральным органом исполнительной власти в области государственной охраны?', options: ['Председатель Правительства РФ', 'Президент РФ', 'Губернатор Федерального округа', 'Министр обороны РФ'], correct: [0] }
                    ],
                    timeLimit: 180,
                    passingScore: 70,
                    createdAt: Date.now()
                },
                {
                    id: 2,
                    name: 'ОБО СПБ - ФЗ ФСО и УК РФ',
                    password: '',
                    questions: [
                        { type: 'choice', text: 'Согласно ФЗ ФСО, каковы основные принципы государственной охраны?', options: ['Законность, уважение прав, централизованное руководство, взаимодействие', 'Только законность', 'Только централизация', 'Законность и гласность'], correct: [0] },
                        { type: 'choice', text: 'Кто является объектом государственной охраны согласно ФЗ ФСО?', options: ['Лица и охраняемые объекты', 'Только граждане РФ', 'Только иностранные граждане', 'Только здания'], correct: [0] },
                        { type: 'choice', text: 'Какая статья ФЗ ФСО определяет меры государственной охраны?', options: ['Статья 4', 'Статья 1', 'Статья 7', 'Статья 10'], correct: [0] }
                    ],
                    timeLimit: 180,
                    passingScore: 70,
                    createdAt: Date.now()
                }
            ];
            testData.results = [];
            saveTestData();
        }

        let currentTest = null, testResults = null, testStartTime = null, testTimer = null;
        let userNick = '', currentQuestionIndex = 0;

        function renderTests() {
            const grid = document.getElementById('testsGrid');
            const count = document.getElementById('testCount');
            grid.innerHTML = '';
            if (testData.tests.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="title">Нет тестов</div></div>`;
                count.textContent = '0';
                return;
            }
            testData.tests.forEach(test => {
                const card = document.createElement('div');
                card.className = 't-card';
                const qCount = test.questions.length;
                const hasPwd = test.password && test.password.length > 0;
                const totalTime = Math.floor(test.timeLimit / 60);
                card.innerHTML = `
                    ${hasPwd ? '<span class="lock">🔒</span>' : ''}
                    <div class="tname">${test.name}</div>
                    <div class="tmeta">${qCount} вопросов</div>
                    <div class="tstats">
                        <span>⏱ ${totalTime > 0 ? totalTime + ' мин' : '< 1 мин'}</span>
                        <span>✅ ${test.passingScore}%</span>
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (hasPwd) {
                        const pwd = prompt('Введите пароль:');
                        if (pwd === test.password) startTest(test.id);
                        else if (pwd !== null) alert('❌ Неверный пароль');
                    } else {
                        startTest(test.id);
                    }
                });
                grid.appendChild(card);
            });
            count.textContent = testData.tests.length;
        }

        function startTest(testId) {
            const test = testData.tests.find(t => t.id === testId);
            if (!test) return;
            currentTest = test;
            testResults = null;
            testStartTime = null;
            userNick = '';
            currentQuestionIndex = 0;
            document.getElementById('testList').classList.add('hidden');
            document.getElementById('testTaking').classList.add('active');
            showNickInput();
        }

        function showNickInput() {
            const container = document.getElementById('testContent');
            container.innerHTML = `
                <div class="nick-box">
                    <h3>👤 Введите ваше имя</h3>
                    <input type="text" class="field" id="nickInput" placeholder="Имя или позывной" style="text-align:center;width:100%;">
                    <button class="btn btn-primary btn-block" style="margin-top:12px;" id="startTestBtn">Начать тест</button>
                </div>
            `;
            document.getElementById('startTestBtn').addEventListener('click', () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) { showToast('⚠️ Введите имя'); document.getElementById('nickInput').classList.add('error'); return; }
                userNick = nick;
                document.getElementById('nickInput').classList.remove('error');
                currentQuestionIndex = 0;
                renderTestQuestion();
            });
            document.getElementById('nickInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('startTestBtn').click(); });
            document.getElementById('nickInput').focus();
        }

        function renderTestQuestion() {
            const container = document.getElementById('testContent');
            const test = currentTest;
            if (!test) return;
            const index = currentQuestionIndex;
            if (index >= test.questions.length) { finishTest(); return; }
            const q = test.questions[index];
            const total = test.questions.length;
            const timeLeft = test.timeLimit - Math.floor((Date.now() - testStartTime) / 1000);

            let html = `
                <div class="flex" style="justify-content:space-between;margin-bottom:6px;">
                    <span class="q-progress">👤 ${userNick} · ${index+1}/${total}</span>
                    <span class="q-progress">${q.type === 'choice' ? 'Выбор' : 'Текст'}</span>
                </div>
                <div class="timer-test" id="testTimer">${formatTime(timeLeft > 0 ? timeLeft : 0)}</div>
                <div class="q-text">${q.text}</div>
            `;

            if (q.type === 'choice') {
                q.options.forEach((opt, i) => {
                    const checked = testResults && testResults[index] && testResults[index].includes(i) ? 'checked' : '';
                    const inputType = q.correct.length > 1 ? 'checkbox' : 'radio';
                    html += `<label class="opt-label ${checked ? 'selected' : ''}"><input type="${inputType}" name="question" value="${i}" ${checked}>${opt}</label>`;
                });
                html += `<div class="flex gap-8 mt-16">
                    <button class="btn btn-primary" id="nextQuestionBtn">${index === total-1 ? '📤 Завершить' : 'Далее →'}</button>
                    ${index > 0 ? `<button class="btn" id="prevQuestionBtn">← Назад</button>` : ''}
                </div>`;
            } else {
                const val = testResults && testResults[index] ? testResults[index][0] || '' : '';
                html += `<div class="text-answer"><textarea id="textAnswer" placeholder="Введите ответ...">${val}</textarea></div>
                <div class="flex gap-8 mt-16">
                    <button class="btn btn-primary" id="nextQuestionBtn">${index === total-1 ? '📤 Завершить' : 'Далее →'}</button>
                    ${index > 0 ? `<button class="btn" id="prevQuestionBtn">← Назад</button>` : ''}
                </div>`;
            }
            container.innerHTML = html;

            if (!testStartTime) {
                testStartTime = Date.now();
                if (testTimer) clearInterval(testTimer);
                testTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - testStartTime) / 1000);
                    const remaining = test.timeLimit - elapsed;
                    if (remaining <= 0) { clearInterval(testTimer); finishTest(); return; }
                    const el = document.getElementById('testTimer');
                    if (el) {
                        el.textContent = formatTime(remaining);
                        el.className = 'timer-test' + (remaining < 30 ? ' danger' : remaining < 60 ? ' warning' : '');
                    }
                }, 1000);
            }

            document.querySelectorAll('.opt-label input').forEach(inp => {
                inp.addEventListener('change', function() {
                    document.querySelectorAll('.opt-label').forEach(l => l.classList.remove('selected'));
                    this.closest('.opt-label').classList.add('selected');
                });
            });

            document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                if (q.type === 'choice') {
                    const selected = document.querySelectorAll('input[name="question"]:checked');
                    if (selected.length === 0) { showToast('⚠️ Выберите ответ'); return; }
                    const values = Array.from(selected).map(el => parseInt(el.value));
                    if (!testResults) testResults = [];
                    testResults[index] = values;
                } else {
                    const ta = document.getElementById('textAnswer');
                    if (ta) {
                        const val = ta.value.trim();
                        if (!val) { showToast('⚠️ Введите ответ'); return; }
                        if (!testResults) testResults = [];
                        testResults[index] = [val];
                    }
                }
                currentQuestionIndex++;
                renderTestQuestion();
            });

            const prevBtn = document.getElementById('prevQuestionBtn');
            if (prevBtn) { prevBtn.addEventListener('click', () => { currentQuestionIndex--; renderTestQuestion(); }); }
        }

        function finishTest() {
            if (testTimer) { clearInterval(testTimer); testTimer = null; }
            showResults();
        }

        function showResults() {
            if (testTimer) { clearInterval(testTimer); testTimer = null; }
            const container = document.getElementById('testContent');
            const test = currentTest;
            let correct = 0;
            const total = test.questions.length;
            let details = [];

            test.questions.forEach((q, idx) => {
                const userAns = testResults && testResults[idx] ? testResults[idx] : null;
                let isCorrect = false, userStr = '';
                if (q.type === 'choice') {
                    if (userAns) {
                        const correctArr = q.correct || [];
                        const sortedUser = userAns.slice().sort();
                        const sortedCorrect = correctArr.slice().sort();
                        isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
                        userStr = userAns.map(i => q.options[i] || 'не выбран').join(', ');
                    } else { userStr = 'не отвечено'; }
                } else {
                    if (userAns && userAns.length > 0) {
                        const uText = userAns[0].toLowerCase().trim();
                        const cTexts = (q.correct || []).map(c => c.toLowerCase().trim());
                        isCorrect = cTexts.some(c => uText.includes(c) || c.includes(uText));
                        userStr = userAns[0] || 'не введено';
                    } else { userStr = 'не введено'; }
                }
                if (isCorrect) correct++;
                details.push({ question: q.text, type: q.type === 'choice' ? 'Выбор' : 'Текст', userAnswer: userStr, isCorrect });
            });

            const percent = Math.round((correct / total) * 100);
            const passed = percent >= test.passingScore;
            const score = Math.round((correct / total) * 5);

            const result = {
                id: Date.now(),
                testId: test.id,
                userNick: userNick,
                date: new Date().toLocaleString(),
                score: score,
                percentage: percent,
                passed: passed,
                answers: details.map(d => ({ userAnswer: d.userAnswer, isCorrect: d.isCorrect })),
                status: 'pending'
            };
            testData.results.push(result);
            saveTestData();

            let html = `
                <div class="score-box">
                    <div style="color:var(--text-muted);font-size:15px;margin-bottom:4px;">👤 ${userNick}</div>
                    <div class="snum">${score}/5</div>
                    <div class="slabel">Баллов</div>
                    <div class="spercent">${percent}%</div>
                    <div class="sresult ${passed ? 'passed' : 'failed'}">${passed ? '✅ СДАН' : '❌ НЕ СДАН'}</div>
                    <div class="sdetail">Правильных: ${correct} из ${total}</div>
                    <div class="spending">⏳ Результат отправлен на проверку</div>
                </div>
                <div class="mt-16"><h4 style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:14px;margin-bottom:8px;">📊 Детали</h4>`;
            details.forEach((d, i) => {
                html += `<div class="a-detail ${d.isCorrect ? 'correct' : 'wrong'}">
                    <div class="ql">Вопрос ${i+1} (${d.type})</div>
                    <div class="qt">${d.question}</div>
                    <div class="ua">Ответ: ${d.userAnswer}</div>
                    <div style="color:${d.isCorrect ? 'var(--green)' : 'var(--red)'};font-size:12px;font-weight:600;margin-top:4px;">${d.isCorrect ? '✅ Правильно' : '❌ Неправильно'}</div>
                </div>`;
            });
            html += `</div>
                <div class="flex gap-8 mt-16">
                    <button class="btn btn-primary" id="finishTestBtn">📋 Завершить</button>
                    <button class="btn" id="retryTestBtn">🔄 Заново</button>
                </div>
            `;
            container.innerHTML = html;

            document.getElementById('finishTestBtn').addEventListener('click', () => {
                document.getElementById('testList').classList.remove('hidden');
                document.getElementById('testTaking').classList.remove('active');
                if (testTimer) clearInterval(testTimer);
                renderTests();
            });
            document.getElementById('retryTestBtn').addEventListener('click', () => {
                testResults = null;
                testStartTime = null;
                currentQuestionIndex = 0;
                if (testTimer) clearInterval(testTimer);
                showNickInput();
            });
        }

        function formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('backToTests').addEventListener('click', function() {
            document.getElementById('testList').classList.remove('hidden');
            document.getElementById('testTaking').classList.remove('active');
            if (testTimer) clearInterval(testTimer);
            renderTests();
        });

        // Инициализация тестов
        loadTestData();
        renderTests();

        // ============================================================
        // 3. Статус "Гость" (просто для вида)
        // ============================================================
        // Ничего не делаем, просто оставляем как есть

        // ============================================================
        // 4. Старт — модуль доклада по умолчанию
        // ============================================================
        document.querySelector('.menu-plate[data-module="report"]').click();

    })();
</script>
