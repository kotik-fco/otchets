<script>
    (function() {
        'use strict';

        const App = {
            tests: [],
            admins: [],
            results: [],
            currentUser: null,
            isLoggedIn: false,
            currentTest: null,
            testResults: null,
            testStartTime: null,
            testTimer: null,
            userNick: '',
            pendingTestId: null,
            draftData: null,
            currentQuestionIndex: 0,

            init() {
                this.loadData();
                this.loadSession();
                this.loadDraft();
                this.renderTests();
                this.renderResults();
                this.setupEventListeners();
                this.updateTestCount();
                this.updateAdminStatus();
                if (this.isLoggedIn) {
                    document.getElementById('editTab').click();
                }
            },

            // ===== DATA =====
            loadData() {
                const saved = localStorage.getItem('fso_tests_data');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        this.tests = data.tests || [];
                        this.admins = data.admins || [];
                        this.results = data.results || [];
                        const adminExists = this.admins.some(a => a.login === 'admin');
                        if (!adminExists) {
                            this.admins.unshift({ login: 'admin', password: '123mastyrbist', protected: true });
                        } else {
                            const adminIdx = this.admins.findIndex(a => a.login === 'admin');
                            if (this.admins[adminIdx]) {
                                this.admins[adminIdx].password = '123mastyrbist';
                                this.admins[adminIdx].protected = true;
                            }
                        }
                    } catch(e) {
                        this.setDefaultData();
                    }
                } else {
                    this.setDefaultData();
                }
            },

            loadSession() {
                const session = localStorage.getItem('fso_session');
                if (session) {
                    try {
                        const data = JSON.parse(session);
                        if (data.login && data.loggedIn) {
                            const admin = this.admins.find(a => a.login === data.login);
                            if (admin) {
                                this.currentUser = admin;
                                this.isLoggedIn = true;
                            }
                        }
                    } catch(e) {}
                }
            },

            saveSession() {
                if (this.isLoggedIn && this.currentUser) {
                    localStorage.setItem('fso_session', JSON.stringify({
                        login: this.currentUser.login,
                        loggedIn: true
                    }));
                } else {
                    localStorage.removeItem('fso_session');
                }
            },

            loadDraft() {
                const draft = localStorage.getItem('fso_draft');
                if (draft) {
                    try {
                        this.draftData = JSON.parse(draft);
                    } catch(e) {
                        this.draftData = null;
                    }
                }
            },

            saveDraft() {
                if (this.draftData) {
                    localStorage.setItem('fso_draft', JSON.stringify(this.draftData));
                } else {
                    localStorage.removeItem('fso_draft');
                }
            },

            saveResults() {
                localStorage.setItem('fso_results', JSON.stringify(this.results));
            },

            setDefaultData() {
                this.admins = [{ login: 'admin', password: '123mastyrbist', protected: true }];
                this.results = [];
                this.tests = [{
                    id: 1,
                    name: 'ФЗ ФСО - Основы государственной охраны',
                    password: '',
                    questions: [
                        { type: 'choice', text: 'Что такое государственная охрана согласно ФЗ ФСО?', options: ['Деятельность по обеспечению безопасности объектов государственной охраны', 'Деятельность по охране государственной границы', 'Деятельность по защите прав граждан', 'Деятельность по обеспечению общественного порядка'], correct: [0] },
                        { type: 'choice', text: 'На основе каких принципов осуществляется государственная охрана?', options: ['Законность, уважение прав человека, централизованное руководство, взаимодействие', 'Законность, гласность, демократизм, независимость', 'Законность, открытость, децентрализация, самоуправление', 'Законность, приоритет интересов государства, единоначалие, закрытость'], correct: [0] },
                        { type: 'choice', text: 'Кто осуществляет руководство федеральным органом исполнительной власти в области государственной охраны?', options: ['Председатель Правительства РФ', 'Президент РФ', 'Губернатор Федерального округа', 'Министр обороны РФ'], correct: [0] },
                        { type: 'choice', text: 'Какие меры включает государственная охрана согласно статье 4?', options: ['Персональная охрана, связь, информация об угрозе, транспортное обслуживание', 'Только персональная охрана', 'Только защита охраняемых объектов', 'Только транспортное обслуживание'], correct: [0] },
                        { type: 'choice', text: 'Кому предоставляется государственная охрана в полном объеме со дня назначения на должность?', options: ['Председателю Правительства РФ и Губернаторам Федеральных округов', 'Всем депутатам Законодательных Собраний', 'Судьям РФ', 'Генеральному прокурору РФ'], correct: [0] },
                        { type: 'choice', text: 'Какие основные задачи органов государственной охраны?', options: ['Обеспечение безопасности объектов охраны, защита охраняемых объектов, пресечение правонарушений', 'Только обеспечение безопасности объектов охраны', 'Только защита охраняемых объектов', 'Только пресечение преступлений'], correct: [0] },
                        { type: 'choice', text: 'Могут ли сотрудники ФСО при исполнении обязанностей не предъявлять удостоверение?', options: ['Да, при сопровождении объектов государственной охраны', 'Нет, никогда', 'Да, всегда', 'Только по требованию прокурора'], correct: [0] },
                        { type: 'choice', text: 'Имеют ли право сотрудники ФСО на хранение и ношение любого оружия?', options: ['Да, разрешено хранение и ношение любого оружия для исполнения служебных обязанностей', 'Нет, только служебное оружие', 'Да, но только с разрешения прокурора', 'Нет, запрещено хранение оружия'], correct: [0] },
                        { type: 'choice', text: 'Могут ли сотрудники ФСО задерживать граждан, представляющих угрозу охраняемым лицам?', options: ['Да, до выяснения обстоятельств или для передачи правоохранителям', 'Нет, не имеют права задерживать', 'Да, но только по решению суда', 'Только если есть письменное разрешение'], correct: [0] },
                        { type: 'choice', text: 'Какие документы подлежат хранению в архивах Правительства РФ?', options: ['Документы о кадровом составе ФСО и методах деятельности', 'Только документы о кадровом составе', 'Только документы о тактике', 'Только документы о методах'], correct: [0] },
                        { type: 'choice', text: 'Вправе ли сотрудник ФСО запретить нахождение на охраняемых объектах в масках и бронежилетах?', options: ['Да, за исключением государственных служащих', 'Нет, не имеет права', 'Да, но только по решению суда', 'Только в отношении иностранных граждан'], correct: [0] },
                        { type: 'choice', text: 'Какой надзор осуществляется за деятельностью ФСО?', options: ['Судебный и прокурорский надзор', 'Только судебный', 'Только прокурорский', 'Только административный'], correct: [0] },
                        { type: 'choice', text: 'Сотрудник ФСО при обращении к гражданину обязан...', options: ['Предоставить удостоверение или жетон с номером', 'Назвать свое имя', 'Предоставить только жетон', 'Не обязан ничего предъявлять'], correct: [0] },
                        { type: 'choice', text: 'Сотрудник ФСО является...', options: ['Представителем власти и военнослужащим', 'Только военнослужащим', 'Только представителем власти', 'Гражданским служащим'], correct: [0] },
                        { type: 'choice', text: 'Может ли сотрудник ФСО отказать гражданину в доступе на охраняемый объект?', options: ['Да, при наличии запрещенных предметов или нарушений', 'Нет, не может', 'Да, но только по решению суда', 'Только в отношении иностранных граждан'], correct: [0] }
                    ],
                    timeLimit: 600,
                    passingScore: 70,
                    createdAt: Date.now()
                }];
                this.saveData();
                this.saveResults();
            },

            saveData() {
                localStorage.setItem('fso_tests_data', JSON.stringify({
                    tests: this.tests,
                    admins: this.admins,
                    results: this.results
                }));
            },

            resetToDefault() {
                if (confirm('Вы уверены? Все текущие тесты и результаты будут удалены.')) {
                    localStorage.removeItem('fso_tests_data');
                    localStorage.removeItem('fso_results');
                    localStorage.removeItem('fso_draft');
                    this.tests = [];
                    this.results = [];
                    this.draftData = null;
                    this.setDefaultData();
                    this.renderTests();
                    this.renderResults();
                    this.updateTestCount();
                    this.showToast('🔄 Тесты сброшены');
                }
            },

            // ===== RENDER =====
            renderTests() {
                const grid = document.getElementById('testsGrid');
                grid.innerHTML = '';
                if (this.tests.length === 0) {
                    grid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="title">Нет доступных тестов</div><div class="desc">Обратитесь к администратору</div></div>`;
                    this.updateTestCount();
                    return;
                }
                this.tests.forEach(test => {
                    const card = document.createElement('div');
                    card.className = 'test-card';
                    const qCount = test.questions.length;
                    const textQ = test.questions.filter(q => q.type === 'text').length;
                    const hasPassword = test.password && test.password.length > 0;
                    const totalTime = Math.floor(test.timeLimit / 60);
                    card.innerHTML = `
                        ${hasPassword ? '<div class="lock-badge">🔒</div>' : ''}
                        <div class="test-name">${test.name}</div>
                        <div class="test-meta">${qCount} вопросов ${textQ > 0 ? `(${textQ} с вводом текста)` : ''}</div>
                        <div class="test-stats">
                            <span>⏱ ${totalTime > 0 ? totalTime + ' мин' : '< 1 мин'}</span>
                            <span>✅ ${test.passingScore}%</span>
                            ${hasPassword ? '<span>🔒 Защищен</span>' : ''}
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        if (hasPassword) {
                            this.pendingTestId = test.id;
                            document.getElementById('testPasswordModal').classList.add('show');
                            document.getElementById('testPasswordInput').value = '';
                            document.getElementById('testPasswordError').textContent = '';
                            document.getElementById('testPasswordInput').focus();
                        } else {
                            this.startTest(test.id);
                        }
                    });
                    grid.appendChild(card);
                });
                this.updateTestCount();
            },

            updateTestCount() {
                document.getElementById('testCount').textContent = this.tests.length;
            },

            updateAdminStatus() {
                const container = document.getElementById('adminStatusContainer');
                if (this.isLoggedIn && this.currentUser) {
                    container.innerHTML = `
                        <div class="admin-status">
                            <span class="dot"></span>
                            <span>${this.currentUser.login}</span>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="admin-status">
                            <span class="dot off"></span>
                            <span style="color:var(--text-muted);">Гость</span>
                        </div>
                    `;
                }
            },

            renderResults() {
                const grid = document.getElementById('resultsGrid');
                grid.innerHTML = '';
                if (this.results.length === 0) {
                    grid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div class="title">Нет результатов</div><div class="desc">Пройдите тест, чтобы появились результаты</div></div>`;
                    document.getElementById('resultsCount').textContent = '0';
                    return;
                }
                const sorted = [...this.results].reverse();
                sorted.forEach(result => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    const statusMap = { pending: '⏳ Ожидает', checked: '✅ Проверено', revision: '🔄 Пересмотр' };
                    const statusClassMap = { pending: 'status-pending', checked: 'status-checked', revision: 'status-revision' };
                    const test = this.tests.find(t => t.id === result.testId);
                    const testName = test ? test.name : 'Тест удален';
                    const score = result.adminScore !== undefined ? result.adminScore : result.score;
                    card.innerHTML = `
                        <div class="result-header">
                            <span class="result-user">👤 ${result.userNick}</span>
                            <span class="result-date">${result.date}</span>
                        </div>
                        <div class="result-test">📝 ${testName}</div>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                            <span class="result-score">${score}/5</span>
                            <span class="status-badge ${statusClassMap[result.status] || 'status-pending'}">${statusMap[result.status] || '⏳ Ожидает'}</span>
                        </div>
                        ${result.adminComment ? `<div style="color:var(--text-secondary);font-size:13px;margin-top:4px;">💬 ${result.adminComment}</div>` : ''}
                        <div class="result-actions">
                            <button class="btn btn-sm btn-primary" data-id="${result.id}">📋 Детали</button>
                            ${this.isLoggedIn ? `<button class="btn btn-sm btn-warning" data-id="${result.id}">✏️ Проверить</button>` : ''}
                            ${this.isLoggedIn ? `<button class="btn btn-sm btn-danger" data-id="${result.id}">🗑 Удалить</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
                document.getElementById('resultsCount').textContent = this.results.length;

                grid.querySelectorAll('[data-id]').forEach(btn => {
                    const id = parseInt(btn.dataset.id);
                    if (btn.textContent.includes('Детали')) {
                        btn.addEventListener('click', () => this.showResultDetail(id));
                    } else if (btn.textContent.includes('Проверить')) {
                        btn.addEventListener('click', () => this.openReview(id));
                    } else if (btn.textContent.includes('Удалить')) {
                        btn.addEventListener('click', () => {
                            if (confirm('Удалить результат?')) this.deleteResult(id);
                        });
                    }
                });
            },

            deleteResult(id) {
                const idx = this.results.findIndex(r => r.id === id);
                if (idx !== -1) {
                    this.results.splice(idx, 1);
                    this.saveData();
                    this.saveResults();
                    this.renderResults();
                    this.showToast('🗑 Результат удален');
                }
            },

            // ===== RESULT DETAIL =====
            showResultDetail(id) {
                const result = this.results.find(r => r.id === id);
                if (!result) { this.showToast('❌ Результат не найден'); return; }
                const test = this.tests.find(t => t.id === result.testId);
                if (!test) { this.showToast('❌ Тест не найден'); return; }

                const statusMap = { pending: '⏳ Ожидает проверки', checked: '✅ Проверено', revision: '🔄 Требует пересмотра' };
                let detailsHtml = '';
                result.answers.forEach((answer, idx) => {
                    const q = test.questions[idx];
                    if (!q) return;
                    const isCorrect = answer.isCorrect;
                    detailsHtml += `
                        <div class="answer-detail ${isCorrect ? 'correct' : 'wrong'}">
                            <div class="q-label">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Ввод текста'})</div>
                            <div class="q-text">${q.text}</div>
                            <div class="user-answer">Ответ: ${answer.userAnswer}</div>
                            ${!isCorrect && q.type === 'choice' ? `<div class="correct-answer-text">Правильно: ${q.correct.map(i => q.options[i]).join(', ')}</div>` : ''}
                            ${!isCorrect && q.type === 'text' ? `<div class="correct-answer-text">Правильно: ${q.correct.join(', ')}</div>` : ''}
                            <div style="color:${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};font-size:12px;margin-top:4px;font-weight:600;">
                                ${isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                            </div>
                        </div>
                    `;
                });

                const modal = document.getElementById('reviewModal');
                document.getElementById('reviewContent').innerHTML = `
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                        <div>
                            <div style="color:var(--text-primary);font-size:18px;font-weight:600;">👤 ${result.userNick}</div>
                            <div style="color:var(--text-secondary);font-size:14px;">📝 ${test.name}</div>
                            <div style="color:var(--text-muted);font-size:13px;">📅 ${result.date}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:28px;font-weight:700;color:var(--accent-green);font-family:'JetBrains Mono',monospace;">${result.adminScore !== undefined ? result.adminScore : result.score}/5</div>
                            <div style="color:var(--text-muted);font-size:12px;">${result.adminScore !== undefined ? 'Ручная проверка' : 'Автоматическая'}</div>
                            <div style="color:var(--text-secondary);font-size:12px;">${statusMap[result.status] || '⏳ Ожидает'}</div>
                        </div>
                    </div>
                    ${result.adminComment ? `<div style="color:var(--accent-gold);font-size:14px;margin-bottom:12px;">💬 ${result.adminComment}</div>` : ''}
                    ${result.reviewedBy ? `<div style="color:var(--text-muted);font-size:12px;margin-bottom:12px;">Проверил: ${result.reviewedBy} | ${result.reviewedAt || ''}</div>` : ''}
                    <div style="margin-top:12px;"><h4 style="color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:14px;margin-bottom:8px;">📊 Детали ответов</h4>${detailsHtml}</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;">
                        <button class="btn btn-primary" id="closeReviewDetail">Закрыть</button>
                        ${this.isLoggedIn ? `<button class="btn btn-warning" id="reviewFromDetail">✏️ Проверить</button>` : ''}
                        ${this.isLoggedIn ? `<button class="btn btn-danger" id="deleteFromDetail">🗑 Удалить</button>` : ''}
                    </div>
                `;
                document.getElementById('closeReviewDetail').addEventListener('click', () => {
                    document.getElementById('reviewModal').classList.remove('show');
                });
                const reviewBtn = document.getElementById('reviewFromDetail');
                if (reviewBtn) {
                    reviewBtn.addEventListener('click', () => {
                        document.getElementById('reviewModal').classList.remove('show');
                        this.openReview(id);
                    });
                }
                const deleteBtn = document.getElementById('deleteFromDetail');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', () => {
                        if (confirm('Удалить результат?')) {
                            document.getElementById('reviewModal').classList.remove('show');
                            this.deleteResult(id);
                        }
                    });
                }
                modal.classList.add('show');
            },

            // ===== REVIEW =====
            openReview(id) {
                const result = this.results.find(r => r.id === id);
                if (!result) { this.showToast('❌ Результат не найден'); return; }
                const test = this.tests.find(t => t.id === result.testId);
                if (!test) { this.showToast('❌ Тест не найден'); return; }

                let detailsHtml = '';
                result.answers.forEach((answer, idx) => {
                    const q = test.questions[idx];
                    if (!q) return;
                    detailsHtml += `
                        <div class="answer-detail">
                            <div class="q-label">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Ввод текста'})</div>
                            <div class="q-text">${q.text}</div>
                            <div class="user-answer">Ответ: ${answer.userAnswer}</div>
                            ${q.type === 'choice' ? `<div class="correct-answer-text">Правильно: ${q.correct.map(i => q.options[i]).join(', ')}</div>` : ''}
                            ${q.type === 'text' ? `<div class="correct-answer-text">Ожидаемый ответ: ${q.correct.join(', ')}</div>` : ''}
                            <div style="color:var(--text-muted);font-size:12px;margin-top:4px;">${answer.isCorrect ? '✅ Был засчитан' : '❌ Не засчитан'}</div>
                        </div>
                    `;
                });

                const modal = document.getElementById('reviewModal');
                document.getElementById('reviewContent').innerHTML = `
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                        <div>
                            <div style="color:var(--text-primary);font-size:18px;font-weight:600;">👤 ${result.userNick}</div>
                            <div style="color:var(--text-secondary);font-size:14px;">📝 ${test.name}</div>
                            <div style="color:var(--text-muted);font-size:13px;">📅 ${result.date}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:20px;font-weight:600;color:var(--accent-green);font-family:'JetBrains Mono',monospace;">${result.adminScore !== undefined ? result.adminScore : result.score}/5</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Оценка (0-5)</label>
                        <input type="number" class="form-control" id="reviewScore" min="0" max="5" value="${result.adminScore !== undefined ? result.adminScore : result.score}" step="0.5">
                    </div>
                    <div class="form-group">
                        <label>Статус</label>
                        <div class="checkbox-group">
                            <label><input type="radio" name="reviewStatus" value="pending" ${result.status === 'pending' ? 'checked' : ''}> ⏳ Ожидает</label>
                            <label><input type="radio" name="reviewStatus" value="checked" ${result.status === 'checked' ? 'checked' : ''}> ✅ Проверено</label>
                            <label><input type="radio" name="reviewStatus" value="revision" ${result.status === 'revision' ? 'checked' : ''}> 🔄 Пересмотр</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Комментарий</label>
                        <textarea class="comment-box" id="reviewComment" placeholder="Комментарий к проверке...">${result.adminComment || ''}</textarea>
                    </div>
                    <div style="margin-top:12px;"><h4 style="color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:14px;margin-bottom:8px;">📊 Детали ответов</h4>${detailsHtml}</div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;">
                        <button class="btn btn-success" id="saveReviewBtn">💾 Сохранить</button>
                        <button class="btn btn-danger" id="deleteFromReview">🗑 Удалить</button>
                        <button class="btn" id="closeReviewBtn">Отмена</button>
                    </div>
                `;
                document.getElementById('closeReviewBtn').addEventListener('click', () => {
                    document.getElementById('reviewModal').classList.remove('show');
                    this.renderResults();
                });
                document.getElementById('deleteFromReview').addEventListener('click', () => {
                    if (confirm('Удалить результат?')) {
                        document.getElementById('reviewModal').classList.remove('show');
                        this.deleteResult(id);
                    }
                });
                document.getElementById('saveReviewBtn').addEventListener('click', () => {
                    const score = parseFloat(document.getElementById('reviewScore').value);
                    const status = document.querySelector('input[name="reviewStatus"]:checked').value;
                    const comment = document.getElementById('reviewComment').value.trim();
                    if (isNaN(score) || score < 0 || score > 5) {
                        this.showToast('⚠️ Оценка от 0 до 5');
                        return;
                    }
                    const idx = this.results.indexOf(result);
                    if (idx !== -1) {
                        this.results[idx].adminScore = score;
                        this.results[idx].status = status;
                        this.results[idx].adminComment = comment;
                        this.results[idx].reviewedBy = this.currentUser ? this.currentUser.login : 'admin';
                        this.results[idx].reviewedAt = new Date().toLocaleString();
                        this.saveData();
                        this.saveResults();
                        document.getElementById('reviewModal').classList.remove('show');
                        this.renderResults();
                        this.showToast('✅ Проверка сохранена');
                    }
                });
                modal.classList.add('show');
            },

            // ===== TEST TAKING =====
            startTest(testId) {
                const test = this.tests.find(t => t.id === testId);
                if (!test) return;
                this.currentTest = test;
                this.testResults = null;
                this.testStartTime = null;
                this.userNick = '';
                this.currentQuestionIndex = 0;
                document.getElementById('testList').classList.add('hidden');
                document.getElementById('resultsList').classList.add('hidden');
                document.getElementById('testTaking').classList.add('active');
                this.showNickInput();
            },

            showNickInput() {
                const container = document.getElementById('testContent');
                container.innerHTML = `
                    <div class="nick-input-container">
                        <h3>👤 Введите ваше имя</h3>
                        <input type="text" class="form-control" id="nickInput" placeholder="Имя или позывной" style="text-align:center;">
                        <button class="btn btn-primary btn-block" style="margin-top:12px;" id="startTestBtn">Начать тест</button>
                    </div>
                `;
                document.getElementById('startTestBtn').addEventListener('click', () => {
                    const nick = document.getElementById('nickInput').value.trim();
                    if (!nick) {
                        this.showToast('⚠️ Введите имя');
                        document.getElementById('nickInput').classList.add('error');
                        return;
                    }
                    this.userNick = nick;
                    document.getElementById('nickInput').classList.remove('error');
                    this.currentQuestionIndex = 0;
                    this.renderTestQuestion();
                });
                document.getElementById('nickInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('startTestBtn').click();
                });
                document.getElementById('nickInput').focus();
            },

            renderTestQuestion() {
                const container = document.getElementById('testContent');
                const test = this.currentTest;
                if (!test) return;
                const index = this.currentQuestionIndex;
                if (index >= test.questions.length) {
                    this.showResults();
                    return;
                }
                const q = test.questions[index];
                const total = test.questions.length;
                const timeLeft = test.timeLimit - Math.floor((Date.now() - this.testStartTime) / 1000);

                let html = `
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;">
                        <span class="question-progress">👤 ${this.userNick} · Вопрос ${index + 1} из ${total}</span>
                        <span class="question-progress">${q.type === 'choice' ? 'Выбор ответа' : 'Ввод текста'}</span>
                    </div>
                    <div class="timer-test" id="testTimer">${this.formatTime(timeLeft > 0 ? timeLeft : 0)}</div>
                    <div class="question-text">${q.text}</div>
                `;

                if (q.type === 'choice') {
                    q.options.forEach((opt, i) => {
                        const checked = this.testResults && this.testResults[index] && this.testResults[index].includes(i) ? 'checked' : '';
                        const inputType = q.correct.length > 1 ? 'checkbox' : 'radio';
                        html += `
                            <label class="option-label ${checked ? 'selected' : ''}">
                                <input type="${inputType}" name="question" value="${i}" ${checked}>
                                ${opt}
                            </label>
                        `;
                    });
                    html += `
                        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                            <button class="btn btn-primary" id="nextQuestionBtn">${index === total - 1 ? '📤 Завершить' : 'Далее →'}</button>
                            ${index > 0 ? `<button class="btn" id="prevQuestionBtn">← Назад</button>` : ''}
                        </div>
                    `;
                } else {
                    const val = this.testResults && this.testResults[index] ? this.testResults[index][0] || '' : '';
                    html += `
                        <div class="text-answer">
                            <textarea id="textAnswer" placeholder="Введите ответ...">${val}</textarea>
                        </div>
                        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                            <button class="btn btn-primary" id="nextQuestionBtn">${index === total - 1 ? '📤 Завершить' : 'Далее →'}</button>
                            ${index > 0 ? `<button class="btn" id="prevQuestionBtn">← Назад</button>` : ''}
                        </div>
                    `;
                }

                container.innerHTML = html;

                if (!this.testStartTime) {
                    this.testStartTime = Date.now();
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.testTimer = setInterval(() => {
                        const elapsed = Math.floor((Date.now() - this.testStartTime) / 1000);
                        const remaining = test.timeLimit - elapsed;
                        if (remaining <= 0) {
                            clearInterval(this.testTimer);
                            this.finishTest();
                            return;
                        }
                        const timerEl = document.getElementById('testTimer');
                        if (timerEl) {
                            timerEl.textContent = this.formatTime(remaining);
                            timerEl.className = 'timer-test' + (remaining < 30 ? ' danger' : remaining < 60 ? ' warning' : '');
                        }
                    }, 1000);
                }

                // Выделение выбранного
                document.querySelectorAll('.option-label input').forEach(inp => {
                    inp.addEventListener('change', function() {
                        document.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
                        this.closest('.option-label').classList.add('selected');
                    });
                });

                document.getElementById('nextQuestionBtn').addEventListener('click', () => {
                    if (q.type === 'choice') {
                        const selected = document.querySelectorAll('input[name="question"]:checked');
                        if (selected.length === 0) {
                            this.showToast('⚠️ Выберите ответ');
                            return;
                        }
                        const values = Array.from(selected).map(el => parseInt(el.value));
                        if (!this.testResults) this.testResults = [];
                        this.testResults[index] = values;
                    } else {
                        const textarea = document.getElementById('textAnswer');
                        if (textarea) {
                            const val = textarea.value.trim();
                            if (!val) {
                                this.showToast('⚠️ Введите ответ');
                                return;
                            }
                            if (!this.testResults) this.testResults = [];
                            this.testResults[index] = [val];
                        }
                    }
                    this.currentQuestionIndex++;
                    this.renderTestQuestion();
                });

                const prevBtn = document.getElementById('prevQuestionBtn');
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        this.currentQuestionIndex--;
                        this.renderTestQuestion();
                    });
                }
            },

            finishTest() {
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.showResults();
            },

            showResults() {
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                const container = document.getElementById('testContent');
                const test = this.currentTest;
                let correctCount = 0;
                const total = test.questions.length;
                let details = [];
                let answerDetails = [];

                test.questions.forEach((q, idx) => {
                    const userAnswer = this.testResults && this.testResults[idx] ? this.testResults[idx] : null;
                    let isCorrect = false;
                    let userAnswerStr = '';
                    if (q.type === 'choice') {
                        if (userAnswer) {
                            const correctArr = q.correct || [];
                            const sortedUser = userAnswer.slice().sort();
                            const sortedCorrect = correctArr.slice().sort();
                            isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
                            userAnswerStr = userAnswer.map(i => q.options[i] || 'не выбран').join(', ');
                        } else {
                            userAnswerStr = 'не отвечено';
                        }
                    } else {
                        if (userAnswer && userAnswer.length > 0) {
                            const userText = userAnswer[0].toLowerCase().trim();
                            const correctTexts = (q.correct || []).map(c => c.toLowerCase().trim());
                            isCorrect = correctTexts.some(c => userText.includes(c) || c.includes(userText));
                            userAnswerStr = userAnswer[0] || 'не введено';
                        } else {
                            userAnswerStr = 'не введено';
                        }
                    }
                    if (isCorrect) correctCount++;
                    details.push({
                        question: q.text,
                        type: q.type === 'choice' ? 'Выбор' : 'Ввод текста',
                        userAnswer: userAnswerStr,
                        isCorrect: isCorrect
                    });
                    answerDetails.push({ userAnswer: userAnswerStr, isCorrect: isCorrect });
                });

                const percentage = Math.round((correctCount / total) * 100);
                const passed = percentage >= test.passingScore;
                const score = Math.round((correctCount / total) * 5);

                const result = {
                    id: Date.now(),
                    testId: test.id,
                    userNick: this.userNick,
                    date: new Date().toLocaleString(),
                    score: score,
                    percentage: percentage,
                    passed: passed,
                    answers: answerDetails,
                    status: 'pending',
                    adminScore: null,
                    adminComment: null,
                    reviewedBy: null,
                    reviewedAt: null
                };
                this.results.push(result);
                this.saveData();
                this.saveResults();

                let html = `
                    <div class="score-display">
                        <div style="color:var(--text-secondary);font-size:16px;margin-bottom:6px;">👤 ${this.userNick}</div>
                        <div class="score-number">${score}/5</div>
                        <div class="score-label">Баллов</div>
                        <div class="score-percent">${percentage}%</div>
                        <div class="score-result ${passed ? 'passed' : 'failed'}">${passed ? '✅ ТЕСТ СДАН' : '❌ ТЕСТ НЕ СДАН'}</div>
                        <div class="score-detail">Правильных ответов: ${correctCount} из ${total}</div>
                        <div class="score-pending">⏳ Результат отправлен на проверку</div>
                    </div>
                    <div style="margin-top:20px;">
                        <h4 style="color:var(--text-secondary);font-family:'JetBrains Mono',monospace;font-size:14px;margin-bottom:10px;">📊 Детали ответов</h4>
                `;
                details.forEach((d, i) => {
                    html += `
                        <div class="answer-detail ${d.isCorrect ? 'correct' : 'wrong'}">
                            <div class="q-label">Вопрос ${i+1} (${d.type})</div>
                            <div class="q-text">${d.question}</div>
                            <div class="user-answer">Ответ: ${d.userAnswer}</div>
                            <div style="color:${d.isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};font-size:12px;font-weight:600;margin-top:4px;">
                                ${d.isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                            </div>
                        </div>
                    `;
                });
                html += `
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                        <button class="btn btn-primary" id="finishTestBtn">📋 Завершить</button>
                        <button class="btn" id="retryTestBtn">🔄 Пройти заново</button>
                    </div>
                `;
                container.innerHTML = html;

                document.getElementById('finishTestBtn').addEventListener('click', () => {
                    document.getElementById('testList').classList.remove('hidden');
                    document.getElementById('resultsList').classList.add('hidden');
                    document.getElementById('testTaking').classList.remove('active');
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.renderTests();
                    this.renderResults();
                });
                document.getElementById('retryTestBtn').addEventListener('click', () => {
                    this.testResults = null;
                    this.testStartTime = null;
                    this.currentQuestionIndex = 0;
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.showNickInput();
                });
            },

            formatTime(seconds) {
                if (seconds < 0) seconds = 0;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            },

            // ===== EVENTS =====
            setupEventListeners() {
                document.getElementById('testsTab').addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('testsTab').classList.add('active');
                    document.getElementById('testList').classList.remove('hidden');
                    document.getElementById('resultsList').classList.add('hidden');
                    document.getElementById('testTaking').classList.remove('active');
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.renderTests();
                });

                document.getElementById('resultsTab').addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('resultsTab').classList.add('active');
                    document.getElementById('testList').classList.add('hidden');
                    document.getElementById('resultsList').classList.remove('hidden');
                    document.getElementById('testTaking').classList.remove('active');
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.renderResults();
                });

                document.getElementById('editTab').addEventListener('click', () => {
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('editTab').classList.add('active');
                    document.getElementById('editModal').classList.add('show');
                    if (this.isLoggedIn) {
                        this.showAdminPanel();
                    } else {
                        document.getElementById('loginForm').style.display = 'block';
                        document.getElementById('adminPanel').style.display = 'none';
                        document.getElementById('loginInput').value = '';
                        document.getElementById('passwordInput').value = '';
                        document.getElementById('loginError').textContent = '';
                    }
                });

                document.getElementById('closeEditModal').addEventListener('click', () => {
                    document.getElementById('editModal').classList.remove('show');
                    document.getElementById('editTab').classList.remove('active');
                    document.getElementById('testsTab').click();
                });

                document.getElementById('closeTestPasswordModal').addEventListener('click', () => {
                    document.getElementById('testPasswordModal').classList.remove('show');
                    this.pendingTestId = null;
                });

                document.getElementById('testPasswordSubmit').addEventListener('click', () => {
                    const password = document.getElementById('testPasswordInput').value.trim();
                    const test = this.tests.find(t => t.id === this.pendingTestId);
                    if (!test) {
                        document.getElementById('testPasswordError').textContent = '❌ Тест не найден';
                        return;
                    }
                    if (password === test.password) {
                        document.getElementById('testPasswordModal').classList.remove('show');
                        this.startTest(this.pendingTestId);
                        this.pendingTestId = null;
                    } else {
                        document.getElementById('testPasswordError').textContent = '❌ Неверный пароль';
                        document.getElementById('testPasswordInput').value = '';
                        document.getElementById('testPasswordInput').focus();
                    }
                });

                document.getElementById('testPasswordInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('testPasswordSubmit').click();
                });

                document.getElementById('loginBtn').addEventListener('click', () => {
                    const login = document.getElementById('loginInput').value.trim();
                    const pass = document.getElementById('passwordInput').value.trim();
                    const admin = this.admins.find(a => a.login === login && a.password === pass);
                    if (admin) {
                        this.currentUser = admin;
                        this.isLoggedIn = true;
                        this.saveSession();
                        document.getElementById('loginError').textContent = '';
                        this.showAdminPanel();
                        this.updateAdminStatus();
                        this.renderResults();
                        this.showToast('✅ Добро пожаловать, ' + login);
                    } else {
                        document.getElementById('loginError').textContent = '❌ Неверный логин или пароль';
                    }
                });

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    this.isLoggedIn = false;
                    this.currentUser = null;
                    this.saveSession();
                    this.updateAdminStatus();
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('adminPanel').style.display = 'none';
                    document.getElementById('loginInput').value = '';
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('loginError').textContent = '';
                    this.renderResults();
                    this.showToast('👋 Вы вышли');
                });

                document.getElementById('newTestBtn').addEventListener('click', () => {
                    this.draftData = null;
                    this.saveDraft();
                    this.openTestEditor(null);
                });

                document.getElementById('continueDraftBtn').addEventListener('click', () => {
                    if (this.draftData) {
                        this.openTestEditor(null, true);
                    } else {
                        this.showToast('⚠️ Нет черновика');
                    }
                });

                document.getElementById('resetTestsBtn').addEventListener('click', () => {
                    this.resetToDefault();
                });

                document.getElementById('addAdminBtn').addEventListener('click', () => {
                    const login = document.getElementById('newAdminLogin').value.trim();
                    const pass = document.getElementById('newAdminPass').value.trim();
                    if (!login || !pass) {
                        this.showToast('⚠️ Заполните поля');
                        return;
                    }
                    if (this.admins.some(a => a.login === login)) {
                        this.showToast('⚠️ Пользователь уже существует');
                        return;
                    }
                    this.admins.push({ login, password: pass, protected: false });
                    this.saveData();
                    this.renderAdminList();
                    document.getElementById('newAdminLogin').value = '';
                    document.getElementById('newAdminPass').value = '';
                    this.showToast('✅ Администратор добавлен');
                });

                document.getElementById('closeTestEditor').addEventListener('click', () => {
                    document.getElementById('testEditorModal').classList.remove('show');
                    this.renderTests();
                    this.renderTestsAdminList();
                });

                document.getElementById('backToTests').addEventListener('click', () => {
                    document.getElementById('testList').classList.remove('hidden');
                    document.getElementById('resultsList').classList.add('hidden');
                    document.getElementById('testTaking').classList.remove('active');
                    if (this.testTimer) clearInterval(this.testTimer);
                    this.renderTests();
                });

                document.getElementById('closeReviewModal').addEventListener('click', () => {
                    document.getElementById('reviewModal').classList.remove('show');
                    this.renderResults();
                });

                document.getElementById('clearResultsBtn').addEventListener('click', () => {
                    if (this.results.length === 0) { this.showToast('📭 Нет результатов'); return; }
                    if (confirm('Удалить все результаты?')) {
                        this.results = [];
                        this.saveData();
                        this.saveResults();
                        this.renderResults();
                        this.showToast('🗑 Все результаты удалены');
                    }
                });

                document.getElementById('loginInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('loginBtn').click();
                });
                document.getElementById('passwordInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('loginBtn').click();
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        document.querySelectorAll('.modal-overlay.show').forEach(el => el.classList.remove('show'));
                    }
                });

                // Закрытие модалок по клику на оверлей
                document.querySelectorAll('.modal-overlay').forEach(overlay => {
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) overlay.classList.remove('show');
                    });
                });
            },

            // ===== ADMIN PANEL =====
            showAdminPanel() {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminNameDisplay').textContent = this.currentUser ? this.currentUser.login : 'admin';
                this.renderAdminList();
                this.renderTestsAdminList();
            },

            renderAdminList() {
                const tbody = document.getElementById('adminListBody');
                tbody.innerHTML = '';
                this.admins.forEach((admin, idx) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${admin.login}</td>
                        <td><span class="status-badge ${admin.protected ? 'protected' : 'normal'}">${admin.protected ? '🔒 Защищен' : '👤 Пользователь'}</span></td>
                        <td>${!admin.protected ? `<button class="btn btn-danger btn-sm" data-idx="${idx}">Удалить</button>` : '—'}</td>
                    `;
                    tbody.appendChild(tr);
                });
                tbody.querySelectorAll('.btn-danger').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        if (this.admins[idx] && !this.admins[idx].protected) {
                            if (confirm(`Удалить "${this.admins[idx].login}"?`)) {
                                this.admins.splice(idx, 1);
                                this.saveData();
                                this.renderAdminList();
                                this.showToast('🗑 Пользователь удален');
                            }
                        }
                    });
                });
            },

            renderTestsAdminList() {
                const container = document.getElementById('testsAdminList');
                container.innerHTML = '';
                if (this.tests.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding:20px;"><div class="desc">Нет созданных тестов</div></div>`;
                    return;
                }
                this.tests.forEach((test, idx) => {
                    const div = document.createElement('div');
                    div.className = 'test-card';
                    div.style.marginBottom = '10px';
                    const qCount = test.questions.length;
                    const textQ = test.questions.filter(q => q.type === 'text').length;
                    const hasPassword = test.password && test.password.length > 0;
                    div.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                            <div>
                                <div class="test-name" style="font-size:15px;">${test.name}</div>
                                <div class="test-meta" style="font-size:12px;">${qCount} вопросов ${textQ > 0 ? `(${textQ} с текстом)` : ''} · ${hasPassword ? '🔒 Защищен' : '🔓 Открытый'}</div>
                            </div>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                                <button class="btn btn-success btn-sm" data-idx="${idx}">✏️</button>
                                <button class="btn btn-danger btn-sm" data-idx="${idx}">🗑</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.querySelectorAll('.btn-success').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        this.openTestEditor(this.tests[idx]);
                    });
                });
                container.querySelectorAll('.btn-danger').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        if (confirm(`Удалить "${this.tests[idx].name}"?`)) {
                            this.tests.splice(idx, 1);
                            this.saveData();
                            this.renderTestsAdminList();
                            this.renderTests();
                            this.updateTestCount();
                            this.showToast('🗑 Тест удален');
                        }
                    });
                });
            },

            // ===== TEST EDITOR =====
            openTestEditor(test, fromDraft = false) {
                const modal = document.getElementById('testEditorModal');
                const container = document.getElementById('editorContent');
                const isNew = !test;

                let t;
                if (fromDraft && this.draftData) {
                    t = this.draftData;
                    document.getElementById('editorTitle').textContent = '📝 Черновик';
                } else if (test) {
                    t = JSON.parse(JSON.stringify(test));
                    document.getElementById('editorTitle').textContent = `✏️ ${test.name}`;
                } else {
                    t = {
                        id: Date.now(),
                        name: '',
                        password: '',
                        questions: [{ type: 'choice', text: '', options: ['', ''], correct: [0] }],
                        timeLimit: 300,
                        passingScore: 70
                    };
                    document.getElementById('editorTitle').textContent = '📝 Новый тест';
                }

                let html = `
                    <div class="form-group">
                        <label>Название теста</label>
                        <input type="text" class="form-control" id="editTestName" value="${t.name || ''}">
                    </div>
                    <div class="form-group">
                        <label>Пароль (пусто — открытый)</label>
                        <input type="text" class="form-control" id="editTestPassword" value="${t.password || ''}" placeholder="Оставьте пустым">
                    </div>
                    <div class="form-group">
                        <label>Время (секунд)</label>
                        <input type="number" class="form-control" id="editTimeLimit" value="${t.timeLimit || 300}">
                    </div>
                    <div class="form-group">
                        <label>Проходной балл (%)</label>
                        <input type="number" class="form-control" id="editPassingScore" value="${t.passingScore || 70}" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label>Вопросы</label>
                        <div id="questionsContainer"></div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
                            <button class="btn btn-success btn-sm" id="addChoiceQuestion">+ Выбор</button>
                            <button class="btn btn-success btn-sm" id="addTextQuestion">+ Текст</button>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                        <button class="btn btn-primary" id="saveTestBtn">💾 Сохранить</button>
                        <button class="btn btn-warning" id="saveDraftBtn">📂 Черновик</button>
                        <button class="btn" id="cancelEditBtn">Отмена</button>
                    </div>
                `;
                container.innerHTML = html;

                const qContainer = document.getElementById('questionsContainer');
                let questions = t.questions || [{ type: 'choice', text: '', options: ['', ''], correct: [0] }];

                function renderQuestions() {
                    qContainer.innerHTML = '';
                    questions.forEach((q, idx) => {
                        const div = document.createElement('div');
                        div.className = 'question-item';
                        let optionsHtml = '';
                        if (q.type === 'choice') {
                            const opts = q.options || ['', ''];
                            optionsHtml = `
                                <div class="form-group" style="margin-bottom:8px;">
                                    <label style="font-size:11px;">Варианты</label>
                                    ${opts.map((opt, oi) => `
                                        <div class="option-row">
                                            <input type="text" class="q-option-input" placeholder="Вариант ${oi + 1}" value="${opt || ''}" data-q="${idx}" data-opt="${oi}">
                                            <input type="checkbox" class="q-option-correct" data-q="${idx}" data-opt="${oi}" ${(q.correct || []).includes(oi) ? 'checked' : ''}>
                                            <span class="correct-label">✔</span>
                                            ${opts.length > 2 ? `<button class="btn btn-danger btn-sm remove-option" data-q="${idx}" data-opt="${oi}">✕</button>` : ''}
                                        </div>
                                    `).join('')}
                                    <button class="btn btn-success btn-sm" style="margin-top:4px;" data-add-option="${idx}">+ Добавить вариант</button>
                                </div>
                            `;
                        } else {
                            optionsHtml = `
                                <div class="form-group" style="margin-bottom:4px;">
                                    <label style="font-size:11px;">Правильные ответы (через запятую)</label>
                                    <input type="text" class="form-control q-correct-text" placeholder="ответ1, ответ2" value="${(q.correct || []).join(', ')}" data-idx="${idx}">
                                </div>
                            `;
                        }
                        div.innerHTML = `
                            <div class="q-header">
                                <span class="q-number">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Текст'})</span>
                                <button class="btn btn-danger btn-sm" data-idx="${idx}">✕</button>
                            </div>
                            <div class="form-group" style="margin-bottom:8px;">
                                <select class="form-control q-type-select" data-idx="${idx}" style="padding:6px 12px;font-size:13px;">
                                    <option value="choice" ${q.type === 'choice' ? 'selected' : ''}>Выбор ответа</option>
                                    <option value="text" ${q.type === 'text' ? 'selected' : ''}>Ввод текста</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin-bottom:8px;">
                                <input type="text" class="form-control q-text-input" placeholder="Текст вопроса" value="${q.text || ''}" data-idx="${idx}">
                            </div>
                            ${optionsHtml}
                        `;
                        qContainer.appendChild(div);
                    });

                    // Удаление вопроса
                    qContainer.querySelectorAll('.q-header .btn-danger').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const idx = parseInt(btn.dataset.idx);
                            if (questions.length > 1) {
                                questions.splice(idx, 1);
                                renderQuestions();
                                autoSaveDraft();
                            } else {
                                App.showToast('⚠️ Хотя бы один вопрос');
                            }
                        });
                    });

                    // Добавление варианта
                    qContainer.querySelectorAll('[data-add-option]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const idx = parseInt(btn.dataset.addOption);
                            if (questions[idx]) {
                                if (!questions[idx].options) questions[idx].options = [];
                                questions[idx].options.push('');
                                renderQuestions();
                                autoSaveDraft();
                            }
                        });
                    });

                    // Удаление варианта
                    qContainer.querySelectorAll('.remove-option').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const qIdx = parseInt(btn.dataset.q);
                            const optIdx = parseInt(btn.dataset.opt);
                            if (questions[qIdx] && questions[qIdx].options.length > 2) {
                                questions[qIdx].options.splice(optIdx, 1);
                                if (questions[qIdx].correct) {
                                    questions[qIdx].correct = questions[qIdx].correct
                                        .filter(c => c !== optIdx)
                                        .map(c => c > optIdx ? c - 1 : c);
                                }
                                renderQuestions();
                                autoSaveDraft();
                            } else {
                                App.showToast('⚠️ Минимум 2 варианта');
                            }
                        });
                    });

                    // Смена типа
                    qContainer.querySelectorAll('.q-type-select').forEach(sel => {
                        sel.addEventListener('change', () => {
                            const idx = parseInt(sel.dataset.idx);
                            questions[idx].type = sel.value;
                            if (sel.value === 'choice' && !questions[idx].options) {
                                questions[idx].options = ['', ''];
                                questions[idx].correct = [0];
                            }
                            if (sel.value === 'text') {
                                questions[idx].options = [];
                                questions[idx].correct = [];
                            }
                            renderQuestions();
                            autoSaveDraft();
                        });
                    });

                    // Ввод текста вопроса
                    qContainer.querySelectorAll('.q-text-input').forEach(inp => {
                        inp.addEventListener('input', () => {
                            const idx = parseInt(inp.dataset.idx);
                            if (questions[idx]) questions[idx].text = inp.value;
                            autoSaveDraft();
                        });
                    });

                    // Ввод вариантов
                    qContainer.querySelectorAll('.q-option-input').forEach(inp => {
                        inp.addEventListener('input', () => {
                            const qIdx = parseInt(inp.dataset.q);
                            const optIdx = parseInt(inp.dataset.opt);
                            if (questions[qIdx] && questions[qIdx].options) {
                                questions[qIdx].options[optIdx] = inp.value;
                                autoSaveDraft();
                            }
                        });
                    });

                    // Чекбоксы правильных ответов
                    qContainer.querySelectorAll('.q-option-correct').forEach(cb => {
                        cb.addEventListener('change', () => {
                            const qIdx = parseInt(cb.dataset.q);
                            const optIdx = parseInt(cb.dataset.opt);
                            if (questions[qIdx]) {
                                if (!questions[qIdx].correct) questions[qIdx].correct = [];
                                if (cb.checked) {
                                    if (!questions[qIdx].correct.includes(optIdx)) {
                                        questions[qIdx].correct.push(optIdx);
                                    }
                                } else {
                                    questions[qIdx].correct = questions[qIdx].correct.filter(c => c !== optIdx);
                                }
                                autoSaveDraft();
                            }
                        });
                    });

                    // Текстовые правильные ответы
                    qContainer.querySelectorAll('.q-correct-text').forEach(inp => {
                        inp.addEventListener('input', () => {
                            const idx = parseInt(inp.dataset.idx);
                            if (questions[idx]) {
                                questions[idx].correct = inp.value.split(',').map(s => s.trim()).filter(s => s);
                                autoSaveDraft();
                            }
                        });
                    });
                }

                function autoSaveDraft() {
                    const name = document.getElementById('editTestName').value.trim();
                    const password = document.getElementById('editTestPassword').value.trim();
                    const timeLimit = parseInt(document.getElementById('editTimeLimit').value) || 300;
                    const passingScore = parseInt(document.getElementById('editPassingScore').value) || 70;
                    App.draftData = {
                        name, password, questions: JSON.parse(JSON.stringify(questions)),
                        timeLimit, passingScore
                    };
                    App.saveDraft();
                }

                renderQuestions();

                document.getElementById('addChoiceQuestion').addEventListener('click', () => {
                    questions.push({ type: 'choice', text: '', options: ['', ''], correct: [0] });
                    renderQuestions();
                    autoSaveDraft();
                });

                document.getElementById('addTextQuestion').addEventListener('click', () => {
                    questions.push({ type: 'text', text: '', correct: [] });
                    renderQuestions();
                    autoSaveDraft();
                });

                document.getElementById('saveDraftBtn').addEventListener('click', () => {
                    autoSaveDraft();
                    App.showToast('📂 Черновик сохранен');
                });

                document.getElementById('saveTestBtn').addEventListener('click', () => {
                    const name = document.getElementById('editTestName').value.trim();
                    const password = document.getElementById('editTestPassword').value.trim();
                    const timeLimit = parseInt(document.getElementById('editTimeLimit').value) || 300;
                    const passingScore = parseInt(document.getElementById('editPassingScore').value) || 70;

                    if (!name) { App.showToast('⚠️ Введите название'); return; }

                    const qItems = qContainer.querySelectorAll('.question-item');
                    const newQuestions = [];
                    let valid = true;

                    qItems.forEach(item => {
                        const type = item.querySelector('.q-type-select').value;
                        const text = item.querySelector('.q-text-input').value.trim();
                        if (!text) { App.showToast('⚠️ Вопрос без текста'); valid = false; return; }

                        let correct = [], options = [];
                        if (type === 'choice') {
                            const optInputs = item.querySelectorAll('.q-option-input');
                            options = Array.from(optInputs).map(inp => inp.value.trim());
                            if (options.length < 2) { App.showToast('⚠️ Минимум 2 варианта'); valid = false; return; }
                            if (options.some(o => !o)) { App.showToast('⚠️ Заполните все варианты'); valid = false; return; }
                            const correctCheckboxes = item.querySelectorAll('.q-option-correct:checked');
                            correct = Array.from(correctCheckboxes).map(cb => parseInt(cb.dataset.opt));
                            if (correct.length === 0) { App.showToast('⚠️ Отметьте правильные ответы'); valid = false; return; }
                        } else {
                            const correctInput = item.querySelector('.q-correct-text');
                            if (correctInput) {
                                correct = correctInput.value.split(',').map(s => s.trim()).filter(s => s);
                                if (correct.length === 0) { App.showToast('⚠️ Укажите правильные ответы'); valid = false; return; }
                            }
                        }
                        newQuestions.push({ type, text, options, correct });
                    });

                    if (!valid || newQuestions.length === 0) return;

                    if (fromDraft && App.draftData) {
                        App.tests.push({
                            id: Date.now(), name, password: password || '', questions: newQuestions,
                            timeLimit, passingScore, createdAt: Date.now()
                        });
                        App.draftData = null;
                        App.saveDraft();
                    } else if (isNew) {
                        App.tests.push({
                            id: Date.now(), name, password: password || '', questions: newQuestions,
                            timeLimit, passingScore, createdAt: Date.now()
                        });
                    } else {
                        const idx = App.tests.indexOf(test);
                        if (idx !== -1) {
                            App.tests[idx] = { ...App.tests[idx], name, password: password || '', questions: newQuestions, timeLimit, passingScore };
                        }
                    }

                    App.saveData();
                    App.renderTests();
                    App.renderTestsAdminList();
                    App.updateTestCount();
                    modal.classList.remove('show');
                    App.showToast('✅ Тест сохранен');
                });

                document.getElementById('cancelEditBtn').addEventListener('click', () => {
                    modal.classList.remove('show');
                });

                document.getElementById('editTestName').addEventListener('input', autoSaveDraft);
                document.getElementById('editTestPassword').addEventListener('input', autoSaveDraft);
                document.getElementById('editTimeLimit').addEventListener('input', autoSaveDraft);
                document.getElementById('editPassingScore').addEventListener('input', autoSaveDraft);

                modal.classList.add('show');
            },

            // ===== TOAST =====
            showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    })();
</script>

</body>
</html>
