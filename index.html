<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ФСО Тестирование</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #080c12;
            --bg-secondary: #0e161f;
            --bg-card: #111a24;
            --bg-input: #0a121c;
            --border-color: #1a2a38;
            --border-hover: #2a4a5a;
            --text-primary: #e8f0f8;
            --text-secondary: #8aacbf;
            --text-muted: #4a6a7a;
            --accent-green: #3ccf9e;
            --accent-green-dim: #1a3a3a;
            --accent-gold: #f5c27a;
            --accent-gold-dim: #2e2818;
            --accent-red: #e8827a;
            --accent-red-dim: #2e1818;
            --accent-blue: #4a8aa0;
            --accent-blue-dim: #1a2a3a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 40px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #0e1a24 0%, transparent 70%);
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #9fc8d9, #6fd6b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title .badge {
            background: var(--bg-card);
            padding: 2px 14px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            -webkit-text-fill-color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .admin-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-green-dim);
            border: 1px solid #2a6a5a;
            border-radius: var(--radius-full);
            padding: 6px 16px 6px 12px;
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
        }

        .admin-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 12px rgba(60, 207, 158, 0.4);
            animation: pulse-dot 1.8s ease-in-out infinite;
        }

        .admin-status .dot.off {
            background: #4a5a5a;
            box-shadow: none;
            animation: none;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .nav-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-btn.active {
            background: var(--accent-blue-dim);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.08);
        }

        /* ===== CONTENT ===== */
        .content {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            min-height: 500px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .count {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 2px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
        }

        /* ===== TEST CARDS ===== */
        .tests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .test-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px 22px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .test-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            opacity: 0;
            transition: var(--transition);
        }

        .test-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .test-card:hover::before {
            opacity: 1;
        }

        .test-card .test-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            padding-right: 30px;
        }

        .test-card .test-meta {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .test-card .test-stats {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .test-card .test-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .test-card .lock-badge {
            position: absolute;
            top: 16px;
            right: 18px;
            font-size: 16px;
            color: var(--accent-gold);
        }

        /* ===== TAKING TEST ===== */
        .test-taking {
            display: none;
        }
        .test-taking.active { display: block; }

        .test-list { display: block; }
        .test-list.hidden { display: none; }

        .timer-test {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-green);
            text-align: center;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .timer-test.warning { color: var(--accent-gold); border-color: #5a4a2a; }
        .timer-test.danger { color: var(--accent-red); border-color: #5a2a2a; animation: blink 1s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .question-progress {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 19px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .option-label {
            display: block;
            padding: 12px 16px;
            margin: 6px 0;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-size: 15px;
        }

        .option-label:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.02);
        }

        .option-label input {
            margin-right: 12px;
            accent-color: var(--accent-blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .option-label.selected {
            border-color: var(--accent-blue);
            background: var(--accent-blue-dim);
            color: var(--text-primary);
        }

        .text-answer textarea {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text-primary);
            width: 100%;
            resize: vertical;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            min-height: 100px;
        }

        .text-answer textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(74, 138, 160, 0.1);
        }

        /* ===== SCORE DISPLAY ===== */
        .score-display {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
        }

        .score-display .score-number {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-green), #5ce6b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }

        .score-display .score-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .score-display .score-percent {
            color: var(--text-secondary);
            font-size: 20px;
            font-weight: 600;
            margin-top: 8px;
        }

        .score-display .score-result {
            font-size: 18px;
            font-weight: 700;
            margin-top: 8px;
            padding: 6px 20px;
            border-radius: var(--radius-full);
            display: inline-block;
        }

        .score-display .score-result.passed {
            color: var(--accent-green);
            background: var(--accent-green-dim);
        }

        .score-display .score-result.failed {
            color: var(--accent-red);
            background: var(--accent-red-dim);
        }

        .score-display .score-detail {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 10px;
        }

        .score-display .score-pending {
            color: var(--accent-gold);
            font-size: 14px;
            margin-top: 12px;
            padding: 8px 16px;
            border: 1px solid #5a4a2a;
            border-radius: var(--radius-full);
            display: inline-block;
            background: var(--accent-gold-dim);
        }

        /* ===== ANSWER DETAILS ===== */
        .answer-detail {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            border-left: 3px solid var(--border-color);
        }

        .answer-detail.correct { border-left-color: var(--accent-green); }
        .answer-detail.wrong { border-left-color: var(--accent-red); }

        .answer-detail .q-label {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .answer-detail .q-text {
            color: var(--text-primary);
            margin: 4px 0;
            font-size: 15px;
        }

        .answer-detail .user-answer {
            color: var(--accent-gold);
            font-size: 14px;
        }

        .answer-detail .correct-answer-text {
            color: var(--accent-green);
            font-size: 14px;
        }

        /* ===== RESULTS ===== */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px 20px;
            transition: var(--transition);
        }

        .result-card:hover {
            border-color: var(--border-hover);
        }

        .result-card .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .result-card .result-user {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }

        .result-card .result-date {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .result-card .result-test {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .result-card .result-score {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
        }

        .result-card .status-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: var(--radius-full);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
        }

        .status-pending { color: var(--accent-gold); border: 1px solid #5a4a2a; background: var(--accent-gold-dim); }
        .status-checked { color: var(--accent-green); border: 1px solid #2a5a4a; background: var(--accent-green-dim); }
        .status-revision { color: var(--accent-red); border: 1px solid #5a2a2a; background: var(--accent-red-dim); }

        .result-actions {
            margin-top: 12px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 10px 24px;
            border-radius: var(--radius-full);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            text-transform: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: var(--accent-blue-dim);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.2);
        }

        .btn-success {
            background: var(--accent-green-dim);
            border-color: #2a6a5a;
            color: var(--accent-green);
        }

        .btn-success:hover:not(:disabled) {
            background: #1a4a4a;
            border-color: var(--accent-green);
        }

        .btn-danger {
            background: var(--accent-red-dim);
            border-color: #5a2a2a;
            color: var(--accent-red);
        }

        .btn-danger:hover:not(:disabled) {
            background: #3a1a1a;
            border-color: var(--accent-red);
        }

        .btn-warning {
            background: var(--accent-gold-dim);
            border-color: #5a4a2a;
            color: var(--accent-gold);
        }

        .btn-warning:hover:not(:disabled) {
            background: #3a2a1a;
            border-color: var(--accent-gold);
        }

        .btn-sm {
            padding: 5px 14px;
            font-size: 12px;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .btn-group .btn { flex: 1; justify-content: center; }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px 32px;
            max-width: 720px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 28px;
            cursor: pointer;
            transition: var(--transition);
            padding: 0 4px;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--accent-red);
            transform: rotate(90deg);
        }

        .modal .form-group {
            margin-bottom: 16px;
        }

        .modal .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .modal .form-control {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-primary);
            width: 100%;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }

        .modal .form-control:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(74, 138, 160, 0.1);
        }

        .modal .form-control.error {
            border-color: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(232, 130, 122, 0.15);
        }

        .modal .form-error {
            color: var(--accent-red);
            font-size: 13px;
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
        }

        .modal .hint {
            color: var(--text-muted);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 4px;
        }

        /* ===== ADMIN PANEL ===== */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 0.5px;
        }

        .admin-table td {
            color: var(--text-primary);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: var(--radius-full);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.protected {
            color: var(--accent-green);
            border: 1px solid #2a5a4a;
            background: var(--accent-green-dim);
        }

        .status-badge.normal {
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
        }

        /* ===== QUESTION EDITOR ===== */
        .question-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
        }

        .question-item .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .question-item .q-header .q-number {
            font-weight: 600;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .option-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 4px;
        }

        .option-row input[type="text"] {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }

        .option-row input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        .option-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-green);
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-row .correct-label {
            color: var(--accent-green);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checkbox-group label {
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-group input[type="radio"] {
            accent-color: var(--accent-blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .comment-box {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-primary);
            width: 100%;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            resize: vertical;
            transition: var(--transition);
        }

        .comment-box:focus {
            border-color: var(--accent-blue);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state .title { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .empty-state .desc { font-size: 14px; }

        /* ===== NICK INPUT ===== */
        .nick-input-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            max-width: 420px;
            margin: 0 auto;
        }

        .nick-input-container h3 {
            color: var(--text-primary);
            font-size: 20px;
            margin-bottom: 16px;
        }

        .nick-input-container input {
            max-width: 300px;
            margin: 0 auto;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 28px;
            border-radius: var(--radius-full);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 14px 18px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                top: 10px;
            }

            .header-title {
                font-size: 18px;
                justify-content: center;
            }

            .header-right {
                justify-content: center;
            }

            .nav-btn {
                font-size: 12px;
                padding: 6px 14px;
            }

            .content {
                padding: 16px;
            }

            .tests-grid {
                grid-template-columns: 1fr;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                padding: 20px;
            }

            .score-display .score-number {
                font-size: 40px;
            }

            .btn-group .btn {
                flex: 1 1 100%;
            }

            .admin-table {
                font-size: 13px;
            }

            .admin-table th, .admin-table td {
                padding: 6px 8px;
            }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .header-title { font-size: 16px; }
            .header-title .badge { font-size: 10px; padding: 1px 10px; }
            .nav-btn { font-size: 11px; padding: 5px 12px; }

            .test-card { padding: 14px 16px; }

            .question-text { font-size: 16px; }
            .option-label { font-size: 14px; padding: 10px 14px; }
            .modal { padding: 16px; }
        }
    </style>
</head>
