<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ФСО Тестирование</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: #111820;
            border-radius: 24px;
            padding: 20px 30px;
            border: 1px solid #26333d;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #1f2f3a inset;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            color: #9fc8d9;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title .badge {
            background: #1a2f3a;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 13px;
            color: #6fa3b5;
            border: 1px solid #2a4857;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #1a3340;
            border: 1px solid #2f5465;
            color: #c4e4f0;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: #234a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.15);
        }

        .nav-btn.active {
            background: #2a4a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 20px rgba(74, 138, 160, 0.2);
        }

        .content {
            background: #111820;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid #26333d;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #1f2f3a inset;
            min-height: 500px;
        }

        .tests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .test-card {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.25s;
            cursor: pointer;
        }

        .test-card:hover {
            border-color: #3a6072;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.05);
            transform: translateY(-2px);
        }

        .test-card .test-name {
            color: #dcecf5;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .test-card .test-meta {
            color: #7a9aa8;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .test-card .test-stats {
            color: #5d8b9a;
            font-size: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #1f323d;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #111820;
            border: 1px solid #26333d;
            border-radius: 24px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }

        .modal-title {
            color: #9fc8d9;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1f313b;
            padding-bottom: 15px;
        }

        .modal-close {
            float: right;
            background: transparent;
            border: none;
            color: #5d8b9a;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: #e8827a;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #7a9aa8;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }

        .form-control {
            background: #0e161e;
            border: 1px solid #21343f;
            border-radius: 10px;
            padding: 10px 14px;
            color: #dcecf5;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: 0.25s;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-control:focus {
            border-color: #4a8aa0;
            box-shadow: 0 0 0 3px rgba(74, 138, 160, 0.15);
        }

        .form-control.error {
            border-color: #8a3a3a;
            box-shadow: 0 0 0 3px rgba(138, 58, 58, 0.2);
        }

        .btn-primary {
            background: #1a3340;
            border: 1px solid #2f5465;
            color: #c4e4f0;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: #234a5a;
            border-color: #4a8aa0;
            box-shadow: 0 0 30px rgba(74, 138, 160, 0.15);
        }

        .btn-danger {
            background: #2a1a1a;
            border: 1px solid #6a2a2a;
            color: #f0b0b0;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-danger:hover {
            background: #3a2222;
            border-color: #8a3a3a;
        }

        .btn-success {
            background: #1a2a2a;
            border: 1px solid #2a5a5a;
            color: #6fd6b8;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .btn-success:hover {
            background: #1a3a3a;
            border-color: #3a7a7a;
        }

        .question-item {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .question-item .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        .mb-20 { margin-bottom: 20px; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3340;
            border: 1px solid #4a8aa0;
            color: #cce2ec;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
        }

        .test-taking {
            display: none;
        }

        .test-taking.active {
            display: block;
        }

        .test-list {
            display: block;
        }

        .test-list.hidden {
            display: none;
        }

        .option-label {
            display: block;
            color: #cce2ec;
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid #1f323d;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover {
            border-color: #3a6072;
            background: #14242e;
        }

        .option-label input[type="radio"], .option-label input[type="checkbox"] {
            margin-right: 10px;
            accent-color: #4a8aa0;
        }

        .option-label.correct {
            border-color: #3ccf9e;
            background: #0a2a2a;
        }

        .option-label.wrong {
            border-color: #e8827a;
            background: #2a1818;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            color: #7a9aa8;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid #1f323d;
        }

        .admin-table td {
            color: #cce2ec;
            padding: 8px 12px;
            border-bottom: 1px solid #1f323d;
        }

        .admin-table tr:hover td {
            background: #0e161f;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.protected {
            color: #6fd6b8;
            border: 1px solid #2b6a5c;
            background: #0f2e2a;
        }

        .status-badge.normal {
            color: #8ab8d4;
            border: 1px solid #2a4a6a;
            background: #18222e;
        }

        .timer-test {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            color: #6fd6b8;
            text-align: center;
            padding: 15px;
            background: #0a1818;
            border: 1px solid #1a4a4a;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .timer-test.warning {
            color: #f5c27a;
            border-color: #7a6a3a;
        }

        .timer-test.danger {
            color: #e8827a;
            border-color: #7a3a3a;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .score-display {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .score-display .score-number {
            font-size: 48px;
            font-weight: 700;
            color: #6fd6b8;
            font-family: 'Courier New', monospace;
        }

        .score-display .score-label {
            color: #7a9aa8;
            font-size: 14px;
            margin-top: 5px;
        }

        .nick-input-container {
            background: #0e161f;
            border: 1px solid #1f323d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .nick-input-container input {
            max-width: 300px;
            margin: 0 auto;
        }

        .text-answer {
            color: #cce2ec;
            padding: 8px 12px;
            margin: 4px 0;
            border: 1px solid #1f323d;
            border-radius: 8px;
            background: #0e161e;
        }

        .text-answer textarea {
            background: transparent;
            border: none;
            color: #cce2ec;
            width: 100%;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            outline: none;
            padding: 4px;
        }

        .text-answer textarea:focus {
            border-color: #4a8aa0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-title">
            📋 ФСО ТЕСТИРОВАНИЕ
            <span class="badge">v2.0</span>
        </div>
        <div class="header-controls">
            <button class="nav-btn active" id="testsTab">📝 Тесты</button>
            <button class="nav-btn" id="editTab">⚙️ Редактирование</button>
        </div>
    </div>

    <div class="content" id="mainContent">
        <div class="test-list" id="testList">
            <div class="flex-between mb-20">
                <h2 style="color:#9fc8d9;font-family:'Courier New',monospace;font-size:20px;">Доступные тесты</h2>
                <span style="color:#5d8b9a;font-size:13px;" id="testCount">0 тестов</span>
            </div>
            <div class="tests-grid" id="testsGrid"></div>
        </div>

        <div class="test-taking" id="testTaking">
            <button class="btn-primary mb-20" id="backToTests">← Назад к тестам</button>
            <div id="testContent"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <button class="modal-close" id="closeEditModal">✕</button>
        <div class="modal-title">⚙️ Редактирование тестов</div>
        <div id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" class="form-control" id="loginInput" placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Введите пароль">
            </div>
            <button class="btn-primary mt-10" id="loginBtn">Войти</button>
            <div style="color:#e8827a;font-size:13px;margin-top:10px;font-family:'Courier New',monospace;" id="loginError"></div>
        </div>
        <div id="adminPanel" style="display:none;">
            <div class="flex-between mb-20">
                <span style="color:#9fc8d9;font-family:'Courier New',monospace;font-size:18px;">Панель управления</span>
                <button class="btn-danger" id="logoutBtn">Выйти</button>
            </div>

            <div class="flex-row mb-20">
                <button class="btn-success" id="newTestBtn">+ Новый тест</button>
            </div>

            <div id="testsAdminList"></div>

            <div class="mt-20">
                <h3 style="color:#7a9aa8;font-family:'Courier New',monospace;font-size:14px;margin-bottom:10px;">👥 Администраторы</h3>
                <div class="flex-row mb-10">
                    <input type="text" class="form-control" style="flex:1;min-width:150px;" id="newAdminLogin" placeholder="Логин">
                    <input type="text" class="form-control" style="flex:1;min-width:150px;" id="newAdminPass" placeholder="Пароль">
                    <button class="btn-success" id="addAdminBtn">Добавить</button>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Логин</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminListBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="testEditorModal">
    <div class="modal">
        <button class="modal-close" id="closeTestEditor">✕</button>
        <div class="modal-title" id="editorTitle">Редактирование теста</div>
        <div id="editorContent"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const App = {
        tests: [],
        admins: [],
        currentUser: null,
        isLoggedIn: false,
        currentTest: null,
        testResults: null,
        testStartTime: null,
        testTimer: null,
        userNick: '',

        init() {
            this.loadData();
            this.renderTests();
            this.setupEventListeners();
            this.updateTestCount();
        },

        loadData() {
            const saved = localStorage.getItem('fso_tests_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    this.tests = data.tests || [];
                    this.admins = data.admins || [];
                    
                    const adminExists = this.admins.some(a => a.login === 'admin');
                    if (!adminExists) {
                        this.admins.unshift({ login: 'admin', password: '123mastyrbist', protected: true });
                    } else {
                        const adminIdx = this.admins.findIndex(a => a.login === 'admin');
                        if (this.admins[adminIdx]) {
                            this.admins[adminIdx].password = '123mastyrbist';
                            this.admins[adminIdx].protected = true;
                        }
                    }
                } catch(e) {
                    this.setDefaultData();
                }
            } else {
                this.setDefaultData();
            }
        },

        setDefaultData() {
            this.admins = [{ login: 'admin', password: '123mastyrbist', protected: true }];
            this.tests = [
                {
                    id: 1,
                    name: 'Основы безопасности ФСО',
                    questions: [
                        { 
                            type: 'choice',
                            text: 'Что означает аббревиатура ФСО?', 
                            options: ['Федеральная служба охраны', 'Федеральная служба обороны', 'Федеральная служба опеки', 'Федеральная служба образования'], 
                            correct: [0] 
                        },
                        { 
                            type: 'choice',
                            text: 'Кто является главой ФСО?', 
                            options: ['Президент РФ', 'Директор ФСО', 'Министр обороны', 'Председатель Правительства'], 
                            correct: [1] 
                        },
                        { 
                            type: 'choice',
                            text: 'Основная задача ФСО - это...', 
                            options: ['Охрана государственных объектов', 'Охрана Президента', 'Охрана общественного порядка', 'Охрана государственных границ'], 
                            correct: [0] 
                        },
                        {
                            type: 'text',
                            text: 'Напишите полное название ФСО',
                            correct: ['Федеральная служба охраны']
                        }
                    ],
                    timeLimit: 300,
                    passingScore: 70,
                    createdAt: Date.now()
                },
                {
                    id: 2,
                    name: 'Устав ФСО 2024',
                    questions: [
                        { 
                            type: 'choice',
                            text: 'Сколько часов составляет суточный наряд?', 
                            options: ['12 часов', '24 часа', '8 часов', '6 часов'], 
                            correct: [1] 
                        },
                        { 
                            type: 'choice',
                            text: 'Что запрещается делать на посту?', 
                            options: ['Спать', 'Курить', 'Разговаривать по телефону', 'Все вышеперечисленное'], 
                            correct: [3] 
                        },
                        { 
                            type: 'choice',
                            text: 'Какой сигнал означает "Тревога"?', 
                            options: ['Один короткий', 'Два длинных', 'Три коротких', 'Непрерывный'], 
                            correct: [2] 
                        },
                        {
                            type: 'text',
                            text: 'Опишите действия дежурного при возникновении пожара',
                            correct: ['вызвать пожарную охрану', 'сообщить начальнику']
                        }
                    ],
                    timeLimit: 240,
                    passingScore: 60,
                    createdAt: Date.now()
                }
            ];
            this.saveData();
        },

        saveData() {
            localStorage.setItem('fso_tests_data', JSON.stringify({
                tests: this.tests,
                admins: this.admins
            }));
        },

        renderTests() {
            const grid = document.getElementById('testsGrid');
            grid.innerHTML = '';
            this.tests.forEach(test => {
                const card = document.createElement('div');
                card.className = 'test-card';
                const qCount = test.questions.length;
                const textQ = test.questions.filter(q => q.type === 'text').length;
                card.innerHTML = `
                    <div class="test-name">${test.name}</div>
                    <div class="test-meta">${qCount} вопросов (${textQ} с вводом текста)</div>
                    <div class="test-stats">
                        ⏱ ${Math.floor(test.timeLimit / 60)} мин | ✅ ${test.passingScore}% для прохождения
                    </div>
                `;
                card.addEventListener('click', () => this.startTest(test.id));
                grid.appendChild(card);
            });
            this.updateTestCount();
        },

        updateTestCount() {
            document.getElementById('testCount').textContent = `${this.tests.length} тестов`;
        },

        startTest(testId) {
            const test = this.tests.find(t => t.id === testId);
            if (!test) return;

            this.currentTest = test;
            this.testResults = null;
            this.testStartTime = null;
            this.userNick = '';

            document.getElementById('testList').classList.add('hidden');
            document.getElementById('testTaking').classList.add('active');

            this.showNickInput();
        },

        showNickInput() {
            const container = document.getElementById('testContent');
            container.innerHTML = `
                <div class="nick-input-container">
                    <h3 style="color:#9fc8d9;font-family:'Courier New',monospace;margin-bottom:15px;">👤 Введите ваше имя</h3>
                    <input type="text" class="form-control" id="nickInput" placeholder="Ваше имя или позывной" style="max-width:300px;margin:0 auto;">
                    <button class="btn-primary mt-10" id="startTestBtn">Начать тест</button>
                </div>
            `;

            document.getElementById('startTestBtn').addEventListener('click', () => {
                const nick = document.getElementById('nickInput').value.trim();
                if (!nick) {
                    this.showToast('⚠️ Введите ваше имя');
                    document.getElementById('nickInput').classList.add('error');
                    return;
                }
                this.userNick = nick;
                document.getElementById('nickInput').classList.remove('error');
                this.renderTestQuestion(0);
            });

            document.getElementById('nickInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('startTestBtn').click();
            });
        },

        renderTestQuestion(index) {
            const container = document.getElementById('testContent');
            const test = this.currentTest;
            if (!test) return;

            if (index >= test.questions.length) {
                this.showResults();
                return;
            }

            const q = test.questions[index];
            const total = test.questions.length;
            const timeLeft = test.timeLimit - Math.floor((Date.now() - this.testStartTime) / 1000);

            let html = `
                <div class="flex-between mb-10">
                    <span style="color:#7a9aa8;font-family:'Courier New',monospace;">
                        👤 ${this.userNick} | Вопрос ${index + 1} из ${total}
                    </span>
                    <span style="color:#7a9aa8;font-family:'Courier New',monospace;">
                        Тип: ${q.type === 'choice' ? 'Выбор ответа' : 'Ввод текста'}
                    </span>
                </div>
                <div class="timer-test" id="testTimer">${this.formatTime(timeLeft > 0 ? timeLeft : 0)}</div>
                <div style="color:#dcecf5;font-size:18px;margin-bottom:15px;">${q.text}</div>
            `;

            if (q.type === 'choice') {
                q.options.forEach((opt, i) => {
                    const checked = this.testResults && this.testResults[index] && this.testResults[index].includes(i) ? 'checked' : '';
                    html += `
                        <label class="option-label" data-index="${i}">
                            <input type="${q.options.length === 1 ? 'radio' : 'checkbox'}" name="question" value="${i}" ${checked}>
                            ${opt}
                        </label>
                    `;
                });
                html += `
                    <div class="flex-row mt-20">
                        <button class="btn-primary" id="nextQuestionBtn">${index === total - 1 ? 'Завершить' : 'Далее →'}</button>
                        ${index > 0 ? `<button class="btn-primary" id="prevQuestionBtn">← Назад</button>` : ''}
                    </div>
                `;
            } else {
                const val = this.testResults && this.testResults[index] ? this.testResults[index][0] || '' : '';
                html += `
                    <div class="text-answer">
                        <textarea rows="3" id="textAnswer" placeholder="Введите ваш ответ...">${val}</textarea>
                    </div>
                    <div class="flex-row mt-20">
                        <button class="btn-primary" id="nextQuestionBtn">${index === total - 1 ? 'Завершить' : 'Далее →'}</button>
                        ${index > 0 ? `<button class="btn-primary" id="prevQuestionBtn">← Назад</button>` : ''}
                    </div>
                `;
            }

            container.innerHTML = html;

            if (!this.testStartTime) {
                this.testStartTime = Date.now();
                if (this.testTimer) clearInterval(this.testTimer);
                this.testTimer = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.testStartTime) / 1000);
                    const remaining = test.timeLimit - elapsed;
                    if (remaining <= 0) {
                        clearInterval(this.testTimer);
                        this.showResults();
                        return;
                    }
                    const timerEl = document.getElementById('testTimer');
                    if (timerEl) {
                        timerEl.textContent = this.formatTime(remaining);
                        if (remaining < 30) timerEl.className = 'timer-test danger';
                        else if (remaining < 60) timerEl.className = 'timer-test warning';
                        else timerEl.className = 'timer-test';
                    }
                }, 1000);
            }

            const nextBtn = document.getElementById('nextQuestionBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (q.type === 'choice') {
                        const selected = document.querySelectorAll('input[name="question"]:checked');
                        if (selected.length === 0) {
                            this.showToast('⚠️ Выберите ответ');
                            return;
                        }
                        const values = Array.from(selected).map(el => parseInt(el.value));
                        if (!this.testResults) this.testResults = [];
                        this.testResults[index] = values;
                    } else {
                        const textarea = document.getElementById('textAnswer');
                        if (textarea) {
                            const val = textarea.value.trim();
                            if (!val) {
                                this.showToast('⚠️ Введите ответ');
                                return;
                            }
                            if (!this.testResults) this.testResults = [];
                            this.testResults[index] = [val];
                        }
                    }
                    this.renderTestQuestion(index + 1);
                });
            }

            const prevBtn = document.getElementById('prevQuestionBtn');
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    this.renderTestQuestion(index - 1);
                });
            }
        },

        showResults() {
            if (this.testTimer) {
                clearInterval(this.testTimer);
                this.testTimer = null;
            }
            const container = document.getElementById('testContent');
            const test = this.currentTest;
            
            let correctCount = 0;
            let totalQuestions = test.questions.length;
            let details = [];

            test.questions.forEach((q, idx) => {
                const userAnswer = this.testResults && this.testResults[idx] ? this.testResults[idx] : null;
                let isCorrect = false;
                let userAnswerStr = '';

                if (q.type === 'choice') {
                    if (userAnswer) {
                        const correctArr = q.correct || [];
                        isCorrect = JSON.stringify(userAnswer.sort()) === JSON.stringify(correctArr.slice().sort());
                        userAnswerStr = userAnswer.map(i => q.options[i] || 'не выбран').join(', ');
                    } else {
                        userAnswerStr = 'не отвечено';
                    }
                } else {
                    if (userAnswer && userAnswer.length > 0) {
                        const userText = userAnswer[0].toLowerCase().trim();
                        const correctTexts = (q.correct || []).map(c => c.toLowerCase().trim());
                        isCorrect = correctTexts.some(c => userText.includes(c) || c.includes(userText));
                        userAnswerStr = userAnswer[0] || 'не введено';
                    } else {
                        userAnswerStr = 'не введено';
                    }
                }

                if (isCorrect) correctCount++;
                
                details.push({
                    question: q.text,
                    type: q.type === 'choice' ? 'Выбор' : 'Ввод текста',
                    userAnswer: userAnswerStr,
                    isCorrect: isCorrect
                });
            });

            const percentage = Math.round((correctCount / totalQuestions) * 100);
            const passed = percentage >= test.passingScore;
            const score = Math.round((correctCount / totalQuestions) * 5);

            let html = `
                <div class="score-display">
                    <div style="color:#7a9aa8;font-size:16px;margin-bottom:10px;">👤 ${this.userNick}</div>
                    <div class="score-number">${score}/5</div>
                    <div class="score-label">Баллов</div>
                    <div style="color:#7a9aa8;font-size:18px;margin-top:10px;">${percentage}%</div>
                    <div style="color:${passed ? '#6fd6b8' : '#e8827a'};font-size:16px;margin-top:5px;font-weight:600;">
                        ${passed ? '✅ ТЕСТ СДАН' : '❌ ТЕСТ НЕ СДАН'}
                    </div>
                    <div style="color:#5d8b9a;font-size:13px;margin-top:10px;">
                        Правильных ответов: ${correctCount} из ${totalQuestions}
                    </div>
                </div>
                <div style="margin-top:20px;">
                    <h4 style="color:#9fc8d9;font-family:'Courier New',monospace;margin-bottom:10px;">📊 Детали ответов</h4>
            `;

            details.forEach((d, i) => {
                html += `
                    <div style="background:#0e161f;border:1px solid ${d.isCorrect ? '#2a5a3a' : '#5a2a2a'};border-radius:8px;padding:10px;margin-bottom:8px;">
                        <div style="color:#7a9aa8;font-size:12px;font-family:'Courier New',monospace;">Вопрос ${i+1} (${d.type})</div>
                        <div style="color:#cce2ec;font-size:14px;">${d.question}</div>
                        <div style="color:#5d8b9a;font-size:13px;margin-top:4px;">Ответ: ${d.userAnswer}</div>
                        <div style="color:${d.isCorrect ? '#6fd6b8' : '#e8827a'};font-size:12px;font-weight:600;margin-top:2px;">
                            ${d.isCorrect ? '✅ Правильно' : '❌ Неправильно'}
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
                <div class="flex-row mt-20">
                    <button class="btn-primary" id="retryTestBtn">🔄 Пройти заново</button>
                    <button class="btn-primary" id="finishTestBtn">📋 Завершить</button>
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('retryTestBtn').addEventListener('click', () => {
                this.testResults = null;
                this.testStartTime = null;
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.showNickInput();
            });

            document.getElementById('finishTestBtn').addEventListener('click', () => {
                document.getElementById('testList').classList.remove('hidden');
                document.getElementById('testTaking').classList.remove('active');
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.renderTests();
            });
        },

        formatTime(seconds) {
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        },

        setupEventListeners() {
            document.getElementById('testsTab').addEventListener('click', () => {
                document.getElementById('testsTab').classList.add('active');
                document.getElementById('editTab').classList.remove('active');
                document.getElementById('testList').classList.remove('hidden');
                document.getElementById('testTaking').classList.remove('active');
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.renderTests();
            });

            document.getElementById('editTab').addEventListener('click', () => {
                document.getElementById('editTab').classList.add('active');
                document.getElementById('testsTab').classList.remove('active');
                document.getElementById('editModal').classList.add('show');
                if (this.isLoggedIn) {
                    this.showAdminPanel();
                } else {
                    document.getElementById('loginForm').style.display = 'block';
                    document.getElementById('adminPanel').style.display = 'none';
                    document.getElementById('loginInput').value = '';
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('loginError').textContent = '';
                }
            });

            document.getElementById('closeEditModal').addEventListener('click', () => {
                document.getElementById('editModal').classList.remove('show');
                document.getElementById('editTab').classList.remove('active');
                document.getElementById('testsTab').classList.add('active');
            });

            document.getElementById('loginBtn').addEventListener('click', () => {
                const login = document.getElementById('loginInput').value.trim();
                const pass = document.getElementById('passwordInput').value.trim();
                const admin = this.admins.find(a => a.login === login && a.password === pass);
                if (admin) {
                    this.currentUser = admin;
                    this.isLoggedIn = true;
                    document.getElementById('loginError').textContent = '';
                    this.showAdminPanel();
                    this.showToast('✅ Добро пожаловать, ' + login);
                } else {
                    document.getElementById('loginError').textContent = '❌ Неверный логин или пароль';
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                this.isLoggedIn = false;
                this.currentUser = null;
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('loginInput').value = '';
                document.getElementById('passwordInput').value = '';
                document.getElementById('loginError').textContent = '';
                this.showToast('👋 Вы вышли из системы');
            });

            document.getElementById('newTestBtn').addEventListener('click', () => {
                this.openTestEditor(null);
            });

            document.getElementById('addAdminBtn').addEventListener('click', () => {
                const login = document.getElementById('newAdminLogin').value.trim();
                const pass = document.getElementById('newAdminPass').value.trim();
                if (!login || !pass) {
                    this.showToast('⚠️ Заполните все поля');
                    return;
                }
                if (this.admins.some(a => a.login === login)) {
                    this.showToast('⚠️ Пользователь уже существует');
                    return;
                }
                this.admins.push({ login, password: pass, protected: false });
                this.saveData();
                this.renderAdminList();
                document.getElementById('newAdminLogin').value = '';
                document.getElementById('newAdminPass').value = '';
                this.showToast('✅ Администратор добавлен');
            });

            document.getElementById('closeTestEditor').addEventListener('click', () => {
                document.getElementById('testEditorModal').classList.remove('show');
                this.renderTests();
                this.renderTestsAdminList();
            });

            document.getElementById('backToTests').addEventListener('click', () => {
                document.getElementById('testList').classList.remove('hidden');
                document.getElementById('testTaking').classList.remove('active');
                if (this.testTimer) {
                    clearInterval(this.testTimer);
                    this.testTimer = null;
                }
                this.renderTests();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay.show').forEach(el => {
                        el.classList.remove('show');
                    });
                }
            });

            document.getElementById('loginInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
            document.getElementById('passwordInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
        },

        showAdminPanel() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            this.renderAdminList();
            this.renderTestsAdminList();
        },

        renderAdminList() {
            const tbody = document.getElementById('adminListBody');
            tbody.innerHTML = '';
            this.admins.forEach((admin, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${admin.login}</td>
                    <td><span class="status-badge ${admin.protected ? 'protected' : 'normal'}">${admin.protected ? '🔒 Защищен' : '👤 Пользователь'}</span></td>
                    <td>
                        ${!admin.protected ? `<button class="btn-danger" data-idx="${idx}">Удалить</button>` : '—'}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            tbody.querySelectorAll('.btn-danger').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (this.admins[idx] && !this.admins[idx].protected) {
                        if (confirm(`Удалить пользователя "${this.admins[idx].login}"?`)) {
                            this.admins.splice(idx, 1);
                            this.saveData();
                            this.renderAdminList();
                            this.showToast('🗑 Пользователь удален');
                        }
                    }
                });
            });
        },

        renderTestsAdminList() {
            const container = document.getElementById('testsAdminList');
            container.innerHTML = '';
            this.tests.forEach((test, idx) => {
                const div = document.createElement('div');
                div.className = 'test-card';
                div.style.marginBottom = '10px';
                const qCount = test.questions.length;
                const textQ = test.questions.filter(q => q.type === 'text').length;
                div.innerHTML = `
                    <div class="flex-between">
                        <div>
                            <div class="test-name">${test.name}</div>
                            <div class="test-meta">${qCount} вопросов (${textQ} с вводом текста)</div>
                        </div>
                        <div class="flex-row">
                            <button class="btn-success" data-idx="${idx}">✏️ Редактировать</button>
                            <button class="btn-danger" data-idx="${idx}">🗑 Удалить</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            container.querySelectorAll('.btn-success').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    this.openTestEditor(this.tests[idx]);
                });
            });

            container.querySelectorAll('.btn-danger').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (confirm(`Удалить тест "${this.tests[idx].name}"?`)) {
                        this.tests.splice(idx, 1);
                        this.saveData();
                        this.renderTestsAdminList();
                        this.renderTests();
                        this.updateTestCount();
                        this.showToast('🗑 Тест удален');
                    }
                });
            });
        },

        openTestEditor(test) {
            const modal = document.getElementById('testEditorModal');
            const container = document.getElementById('editorContent');
            const isNew = !test;

            document.getElementById('editorTitle').textContent = isNew ? '📝 Новый тест' : `✏️ ${test.name}`;

            const t = test || { 
                id: Date.now(), 
                name: '', 
                questions: [{ type: 'choice', text: '', options: ['', ''], correct: [0] }], 
                timeLimit: 300, 
                passingScore: 70 
            };

            let html = `
                <div class="form-group">
                    <label>Название теста</label>
                    <input type="text" class="form-control" id="editTestName" value="${t.name}">
                </div>
                <div class="form-group">
                    <label>Время на тест (секунд)</label>
                    <input type="number" class="form-control" id="editTimeLimit" value="${t.timeLimit}">
                </div>
                <div class="form-group">
                    <label>Проходной балл (%)</label>
                    <input type="number" class="form-control" id="editPassingScore" value="${t.passingScore}" min="0" max="100">
                </div>
                <div class="form-group">
                    <label>Вопросы</label>
                    <div id="questionsContainer"></div>
                    <div class="flex-row mt-10">
                        <button class="btn-success" id="addChoiceQuestion">+ Вопрос с выбором</button>
                        <button class="btn-success" id="addTextQuestion">+ Вопрос с вводом</button>
                    </div>
                </div>
                <div class="flex-row mt-20">
                    <button class="btn-primary" id="saveTestBtn">💾 Сохранить</button>
                    <button class="btn-danger" id="cancelEditBtn">Отмена</button>
                </div>
            `;

            container.innerHTML = html;

            const qContainer = document.getElementById('questionsContainer');
            let questions = t.questions || [{ type: 'choice', text: '', options: ['', ''], correct: [0] }];

            function renderQuestions() {
                qContainer.innerHTML = '';
                questions.forEach((q, idx) => {
                    const div = document.createElement('div');
                    div.className = 'question-item';
                    
                    let optionsHtml = '';
                    if (q.type === 'choice') {
                        const opts = q.options || ['', ''];
                        optionsHtml = `
                            <div class="form-group">
                                <label style="font-size:11px;">Варианты ответов (минимум 2)</label>
                                ${opts.map((opt, oi) => `
                                    <input type="text" class="form-control q-option-input" style="margin-top:4px;" placeholder="Вариант ${oi + 1}" value="${opt}" data-q="${idx}" data-opt="${oi}">
                                `).join('')}
                                <button class="btn-success mt-10" style="font-size:11px;padding:4px 12px;" data-add-option="${idx}">+ Добавить вариант</button>
                            </div>
                            <div class="form-group">
                                <label style="font-size:11px;">Правильные ответы (номера через запятую, 0-${opts.length-1})</label>
                                <input type="text" class="form-control q-correct-input" placeholder="0,2" value="${(q.correct || []).join(',')}" data-idx="${idx}">
                            </div>
                        `;
                    } else {
                        optionsHtml = `
                            <div class="form-group">
                                <label style="font-size:11px;">Правильные варианты (через запятую)</label>
                                <input type="text" class="form-control q-correct-text" placeholder="правильный ответ, вариант 2" value="${(q.correct || []).join(', ')}" data-idx="${idx}">
                            </div>
                        `;
                    }

                    div.innerHTML = `
                        <div class="q-header">
                            <span style="color:#9fc8d9;font-weight:600;">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Ввод текста'})</span>
                            <button class="btn-danger" data-idx="${idx}">✕</button>
                        </div>
                        <div class="form-group">
                            <select class="form-control q-type-select" data-idx="${idx}">
                                <option value="choice" ${q.type === 'choice' ? 'selected' : ''}>Выбор ответа</option>
                                <option value="text" ${q.type === 'text' ? 'selected' : ''}>Ввод текста</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-control q-text-input" placeholder="Текст вопроса" value="${q.text}" data-idx="${idx}">
                        </div>
                        ${optionsHtml}
                    `;
                    qContainer.appendChild(div);
                });

                qContainer.querySelectorAll('.btn-danger').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        if (questions.length > 1) {
                            questions.splice(idx, 1);
                            renderQuestions();
                        } else {
                            this.showToast('⚠️ Должен быть хотя бы один вопрос');
                        }
                    });
                });

                qContainer.querySelectorAll('[data-add-option]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.addOption);
                        if (questions[idx]) {
                            if (!questions[idx].options) questions[idx].options = [];
                            questions[idx].options.push('');
                            renderQuestions();
                        }
                    });
                });

                qContainer.querySelectorAll('.q-type-select').forEach(sel => {
                    sel.addEventListener('change', () => {
                        const idx = parseInt(sel.dataset.idx);
                        questions[idx].type = sel.value;
                        if (sel.value === 'choice' && !questions[idx].options) {
                            questions[idx].options = ['', ''];
                        }
                        if (sel.value === 'text') {
                            questions[idx].options = [];
                        }
                        renderQuestions();
                    });
                });
            }

            renderQuestions();

            document.getElementById('addChoiceQuestion').addEventListener('click', () => {
                questions.push({ type: 'choice', text: '', options: ['', ''], correct: [0] });
                renderQuestions();
            });

            document.getElementById('addTextQuestion').addEventListener('click', () => {
                questions.push({ type: 'text', text: '', correct: [] });
                renderQuestions();
            });

            document.getElementById('saveTestBtn').addEventListener('click', () => {
                const name = document.getElementById('editTestName').value.trim();
                const timeLimit = parseInt(document.getElementById('editTimeLimit').value) || 300;
                const passingScore = parseInt(document.getElementById('editPassingScore').value) || 70;

                if (!name) {
                    this.showToast('⚠️ Введите название теста');
                    return;
                }

                const qItems = qContainer.querySelectorAll('.question-item');
                const newQuestions = [];
                let valid = true;

                qItems.forEach(item => {
                    const type = item.querySelector('.q-type-select').value;
                    const text = item.querySelector('.q-text-input').value.trim();
                    
                    if (!text) {
                        this.showToast('⚠️ Все вопросы должны иметь текст');
                        valid = false;
                        return;
                    }

                    let correct = [];
                    let options = [];

                    if (type === 'choice') {
                        const optInputs = item.querySelectorAll('.q-option-input');
                        options = Array.from(optInputs).map(inp => inp.value.trim());
                        if (options.length < 2) {
                            this.showToast('⚠️ Для вопросов с выбором нужно минимум 2 варианта');
                            valid = false;
                            return;
                        }
                        if (options.some(o => !o)) {
                            this.showToast('⚠️ Все варианты ответов должны быть заполнены');
                            valid = false;
                            return;
                        }
                        const correctInput = item.querySelector('.q-correct-input');
                        if (correctInput) {
                            correct = correctInput.value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n >= 0 && n < options.length);
                            if (correct.length === 0) {
                                this.showToast('⚠️ Укажите правильные ответы (номера через запятую)');
                                valid = false;
                                return;
                            }
                        }
                    } else {
                        const correctInput = item.querySelector('.q-correct-text');
                        if (correctInput) {
                            correct = correctInput.value.split(',').map(s => s.trim()).filter(s => s);
                            if (correct.length === 0) {
                                this.showToast('⚠️ Укажите правильные варианты ответов');
                                valid = false;
                                return;
                            }
                        }
                    }

                    newQuestions.push({ type, text, options, correct });
                });

                if (!valid || newQuestions.length === 0) return;

                if (isNew) {
                    this.tests.push({
                        id: Date.now(),
                        name,
                        questions: newQuestions,
                        timeLimit,
                        passingScore,
                        createdAt: Date.now()
                    });
                } else {
                    const idx = this.tests.indexOf(test);
                    if (idx !== -1) {
                        this.tests[idx] = { ...this.tests[idx], name, questions: newQuestions, timeLimit, passingScore };
                    }
                }

                this.saveData();
                this.renderTests();
                this.renderTestsAdminList();
                this.updateTestCount();
                modal.classList.remove('show');
                this.showToast('✅ Тест сохранен');
            });

            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                modal.classList.remove('show');
            });

            modal.classList.add('show');
        },

        showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
