                        <div>
                            <div class="test-name">${test.name}</div>
                            <div class="test-meta">${qCount} вопросов (${textQ} с вводом текста)</div>
                            <div class="test-stats" style="margin-top:4px;color:#5d8b9a;font-size:11px;">
                                ${hasPassword ? '🔒 Защищен паролем' : '🔓 Без пароля'}
                            </div>
                        </div>
                        <div class="flex-row">
                            <button class="btn-success" data-idx="${idx}">✏️ Редактировать</button>
                            <button class="btn-danger" data-idx="${idx}">🗑 Удалить</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            container.querySelectorAll('.btn-success').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    this.openTestEditor(this.tests[idx]);
                });
            });

            container.querySelectorAll('.btn-danger').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    if (confirm(`Удалить тест "${this.tests[idx].name}"?`)) {
                        this.tests.splice(idx, 1);
                        this.saveData();
                        this.renderTestsAdminList();
                        this.renderTests();
                        this.updateTestCount();
                        this.showToast('🗑 Тест удален');
                    }
                });
            });
        },

        openTestEditor(test, fromDraft = false) {
            const modal = document.getElementById('testEditorModal');
            const container = document.getElementById('editorContent');
            const isNew = !test;

            let t;
            if (fromDraft && this.draftData) {
                t = this.draftData;
                document.getElementById('editorTitle').textContent = '📝 Черновик';
            } else if (test) {
                t = JSON.parse(JSON.stringify(test));
                document.getElementById('editorTitle').textContent = `✏️ ${test.name}`;
            } else {
                t = { 
                    id: Date.now(), 
                    name: '', 
                    password: '',
                    questions: [{ type: 'choice', text: '', options: ['', ''], correct: [0] }], 
                    timeLimit: 300, 
                    passingScore: 70 
                };
                document.getElementById('editorTitle').textContent = '📝 Новый тест';
            }

            let html = `
                <div class="form-group">
                    <label>Название теста</label>
                    <input type="text" class="form-control" id="editTestName" value="${t.name || ''}">
                </div>
                <div class="form-group">
                    <label>Пароль для доступа (оставьте пустым для открытого доступа)</label>
                    <input type="text" class="form-control" id="editTestPassword" value="${t.password || ''}" placeholder="Введите пароль или оставьте пустым">
                </div>
                <div class="form-group">
                    <label>Время на тест (секунд)</label>
                    <input type="number" class="form-control" id="editTimeLimit" value="${t.timeLimit || 300}">
                </div>
                <div class="form-group">
                    <label>Проходной балл (%)</label>
                    <input type="number" class="form-control" id="editPassingScore" value="${t.passingScore || 70}" min="0" max="100">
                </div>
                <div class="form-group">
                    <label>Вопросы</label>
                    <div id="questionsContainer"></div>
                    <div class="flex-row mt-10">
                        <button class="btn-success" id="addChoiceQuestion">+ Вопрос с выбором</button>
                        <button class="btn-success" id="addTextQuestion">+ Вопрос с вводом</button>
                    </div>
                </div>
                <div class="flex-row mt-20">
                    <button class="btn-primary" id="saveTestBtn">💾 Сохранить</button>
                    <button class="btn-success" id="saveDraftBtn">📂 Сохранить черновик</button>
                    <button class="btn-danger" id="cancelEditBtn">Отмена</button>
                </div>
            `;

            container.innerHTML = html;

            const qContainer = document.getElementById('questionsContainer');
            let questions = t.questions || [{ type: 'choice', text: '', options: ['', ''], correct: [0] }];

            function renderQuestions() {
                qContainer.innerHTML = '';
                questions.forEach((q, idx) => {
                    const div = document.createElement('div');
                    div.className = 'question-item';
                    
                    let optionsHtml = '';
                    if (q.type === 'choice') {
                        const opts = q.options || ['', ''];
                        optionsHtml = `
                            <div class="form-group">
                                <label style="font-size:11px;">Варианты ответов (минимум 2)</label>
                                ${opts.map((opt, oi) => `
                                    <div class="option-row">
                                        <input type="text" class="form-control q-option-input" placeholder="Вариант ${oi + 1}" value="${opt || ''}" data-q="${idx}" data-opt="${oi}">
                                        <input type="checkbox" class="q-option-correct" data-q="${idx}" data-opt="${oi}" ${(q.correct || []).includes(oi) ? 'checked' : ''}>
                                        <span class="correct-label">✔</span>
                                        ${opts.length > 2 ? `<button class="btn-danger-small remove-option" data-q="${idx}" data-opt="${oi}">✕</button>` : ''}
                                    </div>
                                `).join('')}
                                <button class="btn-success-small mt-10" data-add-option="${idx}">+ Добавить вариант</button>
                            </div>
                        `;
                    } else {
                        optionsHtml = `
                            <div class="form-group">
                                <label style="font-size:11px;">Правильные варианты (через запятую)</label>
                                <input type="text" class="form-control q-correct-text" placeholder="правильный ответ, вариант 2" value="${(q.correct || []).join(', ')}" data-idx="${idx}">
                            </div>
                        `;
                    }

                    div.innerHTML = `
                        <div class="q-header">
                            <span style="color:#9fc8d9;font-weight:600;">Вопрос ${idx + 1} (${q.type === 'choice' ? 'Выбор' : 'Ввод текста'})</span>
                            <button class="btn-danger" data-idx="${idx}">✕</button>
                        </div>
                        <div class="form-group">
                            <select class="form-control q-type-select" data-idx="${idx}">
                                <option value="choice" ${q.type === 'choice' ? 'selected' : ''}>Выбор ответа</option>
                                <option value="text" ${q.type === 'text' ? 'selected' : ''}>Ввод текста</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-control q-text-input" placeholder="Текст вопроса" value="${q.text || ''}" data-idx="${idx}">
                        </div>
                        ${optionsHtml}
                    `;
                    qContainer.appendChild(div);
                });

                qContainer.querySelectorAll('.btn-danger').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.idx);
                        if (questions.length > 1) {
                            questions.splice(idx, 1);
                            renderQuestions();
                            autoSaveDraft();
                        } else {
                            App.showToast('⚠️ Должен быть хотя бы один вопрос');
                        }
                    });
                });

                qContainer.querySelectorAll('[data-add-option]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.addOption);
                        if (questions[idx]) {
                            if (!questions[idx].options) questions[idx].options = [];
                            questions[idx].options.push('');
                            renderQuestions();
                            autoSaveDraft();
                        }
                    });
                });

                qContainer.querySelectorAll('.remove-option').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const qIdx = parseInt(btn.dataset.q);
                        const optIdx = parseInt(btn.dataset.opt);
                        if (questions[qIdx] && questions[qIdx].options.length > 2) {
                            questions[qIdx].options.splice(optIdx, 1);
                            if (questions[qIdx].correct) {
                                questions[qIdx].correct = questions[qIdx].correct
                                    .filter(c => c !== optIdx)
                                    .map(c => c > optIdx ? c - 1 : c);
                            }
                            renderQuestions();
                            autoSaveDraft();
                        } else {
                            App.showToast('⚠️ Должно быть минимум 2 варианта');
                        }
                    });
                });

                qContainer.querySelectorAll('.q-type-select').forEach(sel => {
                    sel.addEventListener('change', () => {
                        const idx = parseInt(sel.dataset.idx);
                        questions[idx].type = sel.value;
                        if (sel.value === 'choice' && !questions[idx].options) {
                            questions[idx].options = ['', ''];
                            questions[idx].correct = [0];
                        }
                        if (sel.value === 'text') {
                            questions[idx].options = [];
                            questions[idx].correct = [];
                        }
                        renderQuestions();
                        autoSaveDraft();
                    });
                });

                qContainer.querySelectorAll('.q-text-input').forEach(inp => {
                    inp.addEventListener('input', () => {
                        const idx = parseInt(inp.dataset.idx);
                        if (questions[idx]) {
                            questions[idx].text = inp.value;
                            autoSaveDraft();
                        }
                    });
                });

                qContainer.querySelectorAll('.q-option-input').forEach(inp => {
                    inp.addEventListener('input', () => {
                        const qIdx = parseInt(inp.dataset.q);
                        const optIdx = parseInt(inp.dataset.opt);
                        if (questions[qIdx] && questions[qIdx].options) {
                            questions[qIdx].options[optIdx] = inp.value;
                            autoSaveDraft();
                        }
                    });
                });

                qContainer.querySelectorAll('.q-option-correct').forEach(cb => {
                    cb.addEventListener('change', () => {
                        const qIdx = parseInt(cb.dataset.q);
                        const optIdx = parseInt(cb.dataset.opt);
                        if (questions[qIdx]) {
                            if (!questions[qIdx].correct) questions[qIdx].correct = [];
                            if (cb.checked) {
                                if (!questions[qIdx].correct.includes(optIdx)) {
                                    questions[qIdx].correct.push(optIdx);
                                }
                            } else {
                                questions[qIdx].correct = questions[qIdx].correct.filter(c => c !== optIdx);
                            }
                            autoSaveDraft();
                        }
                    });
                });

                qContainer.querySelectorAll('.q-correct-text').forEach(inp => {
                    inp.addEventListener('input', () => {
                        const idx = parseInt(inp.dataset.idx);
                        if (questions[idx]) {
                            questions[idx].correct = inp.value.split(',').map(s => s.trim()).filter(s => s);
                            autoSaveDraft();
                        }
                    });
                });
            }

            function autoSaveDraft() {
                const name = document.getElementById('editTestName').value.trim();
                const password = document.getElementById('editTestPassword').value.trim();
                const timeLimit = parseInt(document.getElementById('editTimeLimit').value) || 300;
                const passingScore = parseInt(document.getElementById('editPassingScore').value) || 70;

                App.draftData = {
                    name: name,
                    password: password,
                    questions: JSON.parse(JSON.stringify(questions)),
                    timeLimit: timeLimit,
                    passingScore: passingScore
                };
                App.saveDraft();
            }

            renderQuestions();

            document.getElementById('addChoiceQuestion').addEventListener('click', () => {
                questions.push({ type: 'choice', text: '', options: ['', ''], correct: [0] });
                renderQuestions();
                autoSaveDraft();
            });

            document.getElementById('addTextQuestion').addEventListener('click', () => {
                questions.push({ type: 'text', text: '', correct: [] });
                renderQuestions();
                autoSaveDraft();
            });

            document.getElementById('saveDraftBtn').addEventListener('click', () => {
                autoSaveDraft();
                App.showToast('📂 Черновик сохранен');
            });

            document.getElementById('saveTestBtn').addEventListener('click', () => {
                const name = document.getElementById('editTestName').value.trim();
                const password = document.getElementById('editTestPassword').value.trim();
                const timeLimit = parseInt(document.getElementById('editTimeLimit').value) || 300;
                const passingScore = parseInt(document.getElementById('editPassingScore').value) || 70;

                if (!name) {
                    App.showToast('⚠️ Введите название теста');
                    return;
                }

                const qItems = qContainer.querySelectorAll('.question-item');
                const newQuestions = [];
                let valid = true;

                qItems.forEach(item => {
                    const type = item.querySelector('.q-type-select').value;
                    const text = item.querySelector('.q-text-input').value.trim();
                    
                    if (!text) {
                        App.showToast('⚠️ Все вопросы должны иметь текст');
                        valid = false;
                        return;
                    }

                    let correct = [];
                    let options = [];

                    if (type === 'choice') {
                        const optInputs = item.querySelectorAll('.q-option-input');
                        options = Array.from(optInputs).map(inp => inp.value.trim());
                        if (options.length < 2) {
                            App.showToast('⚠️ Для вопросов с выбором нужно минимум 2 варианта');
                            valid = false;
                            return;
                        }
                        if (options.some(o => !o)) {
                            App.showToast('⚠️ Все варианты ответов должны быть заполнены');
                            valid = false;
                            return;
                        }
                        const correctCheckboxes = item.querySelectorAll('.q-option-correct:checked');
                        correct = Array.from(correctCheckboxes).map(cb => parseInt(cb.dataset.opt));
                        if (correct.length === 0) {
                            App.showToast('⚠️ Отметьте правильные ответы галочками');
                            valid = false;
                            return;
                        }
                    } else {
                        const correctInput = item.querySelector('.q-correct-text');
                        if (correctInput) {
                            correct = correctInput.value.split(',').map(s => s.trim()).filter(s => s);
                            if (correct.length === 0) {
                                App.showToast('⚠️ Укажите правильные варианты ответов');
                                valid = false;
                                return;
                            }
                        }
                    }

                    newQuestions.push({ type, text, options, correct });
                });

                if (!valid || newQuestions.length === 0) return;

                if (fromDraft && App.draftData) {
                    App.tests.push({
                        id: Date.now(),
                        name,
                        password: password || '',
                        questions: newQuestions,
                        timeLimit,
                        passingScore,
                        createdAt: Date.now()
                    });
                    App.draftData = null;
                    App.saveDraft();
                } else if (isNew) {
                    App.tests.push({
                        id: Date.now(),
                        name,
                        password: password || '',
                        questions: newQuestions,
                        timeLimit,
                        passingScore,
                        createdAt: Date.now()
                    });
                } else {
                    const idx = App.tests.indexOf(test);
                    if (idx !== -1) {
                        App.tests[idx] = { ...App.tests[idx], name, password: password || '', questions: newQuestions, timeLimit, passingScore };
                    }
                }

                App.saveData();
                App.renderTests();
                App.renderTestsAdminList();
                App.updateTestCount();
                modal.classList.remove('show');
                App.showToast('✅ Тест сохранен');
            });

            document.getElementById('cancelEditBtn').addEventListener('click', () => {
                modal.classList.remove('show');
            });

            document.getElementById('editTestName').addEventListener('input', autoSaveDraft);
            document.getElementById('editTestPassword').addEventListener('input', autoSaveDraft);
            document.getElementById('editTimeLimit').addEventListener('input', autoSaveDraft);
            document.getElementById('editPassingScore').addEventListener('input', autoSaveDraft);

            modal.classList.add('show');
        },

        showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
